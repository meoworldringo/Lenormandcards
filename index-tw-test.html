<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
  --intro-time: 4s;   /* ⭐ 开场总长（你可以改） */
  --scene-time: 2s;   /* ⭐ 场景淡入 */
  --loop-delay: 6s;   /* ⭐ 动画开始时间 = 前两段总和 */
}

/* 🌑 开场 */
.intro{
  animation: introFade var(--intro-time) forwards;
}

@keyframes introFade{
  0%{opacity:1;}
  80%{opacity:1;}
  100%{opacity:0; visibility:hidden;}
}

/* 🖼 场景淡入 */
.wrapper{
  opacity:0;
  filter:blur(6px);
  animation: sceneIn var(--scene-time) ease forwards;
  animation-delay: calc(var(--intro-time) - var(--scene-time));
}

@keyframes sceneIn{
  to{
    opacity:1;
    filter:blur(0);
  }
}

/* ⭐ 所有动画统一延迟 */
.book-img,
.cards,
.photo-img,
.t1,.t2,.t3{
  animation-delay: var(--loop-delay);
}

/* 📖 书 */
.book-img{
  animation: bookCycle 12s infinite;
}

@keyframes bookCycle{
  0%,20%{filter:drop-shadow(0 0 30px #b4dcff);}
  25%,100%{filter:drop-shadow(0 0 6px rgba(180,220,255,0.2));}
}

/* 🃏 牌 */
.cards{
  animation: cardCycle 12s infinite;
}

@keyframes cardCycle{
  0%,30%{filter:drop-shadow(0 0 6px rgba(180,220,255,0.2));}
  35%,55%{filter:drop-shadow(0 0 30px #b4dcff);}
  60%,100%{filter:drop-shadow(0 0 6px rgba(180,220,255,0.2));}
}

/* 🖼 相片 */
.photo-img{
  animation: photoCycle 12s infinite;
}

@keyframes photoCycle{
  0%,60%{filter:drop-shadow(0 0 6px rgba(180,220,255,0.2));}
  65%,85%{filter:drop-shadow(0 0 30px #b4dcff);}
}

/* ✨ 文字 */
.t1{animation: t1 12s infinite;}
.t2{animation: t2 12s infinite;}
.t3{animation: t3 12s infinite;}

@keyframes t1{
  0%,20%{opacity:1;}
  25%,100%{opacity:0;}
}

@keyframes t2{
  0%,30%{opacity:0;}
  35%,55%{opacity:1;}
}

@keyframes t3{
  0%,60%{opacity:0;}
  65%,85%{opacity:1;}
}

</style>
</head>

<body>

<div class="intro">
  <div class="intro-text">
    <p class="line">與AI共同編織的雷諾曼世界，</p>
    <p class="line">歡迎來到——秘密集市！</p>
  </div>
</div>

<div class="wrapper">

  <img src="index-tw-full.jpg" class="main-bg">

  <div class="glow"></div>

  <div class="crystal">
    <div class="crystal-text">
      <span class="t1">命運圖譜</span>
      <span class="t2">幕後編織者</span>
      <span class="t3">開啟占卜</span>
    </div>
  </div>

  <div class="book">
    <img src="index-book-tw.png" class="book-img">
  </div>

  <div class="photo">
    <img src="index-photo.png" class="photo-img">
  </div>

  <div class="card">
    <img src="index-card.png" class="cards">
  </div>

</div>

</body>
</html>
