<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* 🌌 背景氛围 */
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at center, #3a2a1c 0%, #0d0805 100%);
}

/* 📷 主图 */
/* 🖼 主容器 */

.wrapper {

  position: relative;

  width: 100%;

  height: 100%;

}

.main-bg {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* 🌫️ 雾气 */
.fog {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;

  /* 🌫️ 底层柔雾 */
  background:
    radial-gradient(circle at 30% 70%, rgba(255,255,255,0.25), transparent 60%),
    radial-gradient(circle at 70% 30%, rgba(255,255,255,0.18), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.12), transparent 70%);

  mix-blend-mode: screen;

  /* ⭐ 关键：模糊 */
  filter: blur(20px);

  animation: fogMove 18s ease-in-out infinite;
}

/* 🌫️ 第二层：真实雾纹 */
.fog::before {
  content: "";
  position: absolute;
  inset: -20%;
  
  background: url("https://images.unsplash.com/photo-1549887534-1541e9326642?q=80&w=1200&auto=format&fit=crop");
  background-size: cover;
  
  opacity: 0.12;
  mix-blend-mode: screen;

  filter: blur(40px);
  
  animation: fogDrift 30s linear infinite;
}

@keyframes fogMove {
  0%   { transform: translate(0,0); opacity: 0.6; }
  50%  { transform: translate(-20px, 15px); opacity: 0.8; }
  100% { transform: translate(0,0); opacity: 0.6; }
}

@keyframes fogDrift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-100px); }
}

.fog-veil {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;

  background: rgba(255, 255, 255, 0.35);

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

/* 不均匀雾 */
.fog-veil::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 30% 60%, rgba(255,255,255,0.45), transparent 60%),
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.2), transparent 60%);

  mix-blend-mode: screen;
}

/* ✨ 中央微光（聚焦） */
.glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(circle at center, rgba(255,220,140,0.08), transparent 70%);
}

/* 🧿 点击区域 */
.hotspot {
  position: absolute;
  z-index: 3;
}

/* 📖 书 */
.book {
  bottom: 12%;
  left: 20%;
  width: 20%;
  height: 15%;
}

/* 🖼 相片 */
.photo {
  bottom: 12%;
  right: 20%;
  width: 18%;
  height: 15%;
}

/* 🃏 中央牌 */
.card {
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 20%;
  height: 25%;
}

/* ✨ 呼吸光（主入口更明显） */
.card::after {
  content: "";
  position: absolute;
  inset: -10%;
  background: radial-gradient(rgba(255,220,140,0.4), transparent 70%);
  animation: pulse 2.5s infinite;
  border-radius: 20px;
}

  .book::after,
.photo::after {
  content: "";
  position: absolute;
  inset: -8%;
  background: radial-gradient(rgba(255,220,140,0.25), transparent 70%);
  border-radius: 12px;
  opacity: 0.4;
  animation: softGlow 4s infinite;
}

@keyframes softGlow {
  0%,100% { opacity: 0.2; }
  50% { opacity: 0.5; }
}

@keyframes pulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* 📱 点击反馈 */
.hotspot:active {
  transform: scale(0.95);
}

/* 📝 一次性提示 */
.hint {
  position: fixed;
  bottom: 10%;
  width: 100%;
  text-align: center;
  color: #f5e6c8;
  font-size: 14px;
  opacity: 0.8;
  animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
  0% { opacity: 0.8; }
  70% { opacity: 0.8; }
  100% { opacity: 0; }
}
</style>
</head>

<body>

<div class="wrapper">
  <img src="index-tw-full.jpg" class="main-bg">
  <div class="glow"></div>
  <div class="fog-veil"></div>
  <div class="hotspot book"></div>
  <div class="hotspot photo"></div>
  <div class="hotspot card"></div>

</div>

  <img src="index-tw-full.jpg" class="main-bg">

  <div class="glow"></div>
  <div class="fog"></div>

  <!-- 点击区域 -->
  <div class="hotspot book" onclick="goMeaning()"></div>
  <div class="hotspot photo" onclick="goProfile()"></div>
  <div class="hotspot card" onclick="openMenu()"></div>

</div>

<div class="hint">✨ 輕觸物件開始探索</div>

<script>
function goMeaning() {
  window.location.href = "meaning.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function openMenu() {
  alert("這裡之後放：一張 / 兩張 / 三張選單");
}
</script>

</body>
</html>
