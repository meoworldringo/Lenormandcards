<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* 🌌 背景氛围 */
body {
  display: flex;
  align-items: center;
  justify-content: center;
  background:
    radial-gradient(circle at center, #3a2a1c 0%, #0d0805 100%);
}

/* 🖼 主容器 */

.wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 100vw;
}

.main-bg {
  width: 100%;
  height: 100%;
  object-fit: contain;
  width: 100%;
  filter: brightness(0.75) contrast(1.08);
}

/* 🌫️ 第二层：真实雾纹 */
.fog::before {
  content: "";
  position: absolute;
  inset: -20%;
  
  background: url("https://images.unsplash.com/photo-1549887534-1541e9326642?q=80&w=1200&auto=format&fit=crop");
  background-size: cover;
  
  opacity: 0.12;
  mix-blend-mode: screen;

  filter: blur(40px);
  
  animation: fogDrift 30s linear infinite;
}

@keyframes fogMove {
  0%   { transform: translate(0,0); opacity: 0.6; }
  50%  { transform: translate(-20px, 15px); opacity: 0.8; }
  100% { transform: translate(0,0); opacity: 0.6; }
}

@keyframes fogDrift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-100px); }
}

.fog {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;

  background:
    radial-gradient(circle at 20% 80%, rgba(255,255,255,0.25), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,0.18), transparent 60%),
    radial-gradient(circle at 50% 100%, rgba(255,255,255,0.12), transparent 70%);

  filter: blur(25px);

  mix-blend-mode: screen;

  animation: fogMove 20s ease-in-out infinite;
}

  /* 🌫️ 柔边（避免光圈） */
  mask-image: radial-gradient(circle at center,
    transparent 30%,
    rgba(0,0,0,0.2) 50%,
    rgba(0,0,0,0.6) 70%,
    black 90%
  );

  -webkit-mask-image: radial-gradient(circle at center,
    transparent 30%,
    rgba(0,0,0,0.2) 50%,
    rgba(0,0,0,0.6) 70%,
    black 90%
  );

  /* ⭐ 加流动 */
  animation: fogFlow 20s ease-in-out infinite;
}

/* 🌫️ 第二层雾（增加流动层次） */
/* 🌫️ 第二层（反方向） */

.fog-veil::before {
  content: "";
  position: absolute;
  inset: -20%;
  background: url("https://images.unsplash.com/photo-1520895915443-8f1f4c52f7a3?q=80&w=1200&auto=format&fit=crop");
  background-size: cover;
  opacity: 0.12;
  filter: blur(50px);
  mix-blend-mode: screen;
  animation: fogMoveX2 60s linear infinite,
             fogMoveY2 35s ease-in-out infinite;

}

  /* 🌫️ 横向漂 */

@keyframes fogMoveX {

  0% { transform: translateX(0); }

  100% { transform: translateX(-120px); }

}

@keyframes fogMoveX2 {

  0% { transform: translateX(0); }

  100% { transform: translateX(120px); }

}

/* 🌫️ 上下浮 */

@keyframes fogMoveY {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(40px); }
}

@keyframes fogMoveY2 {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

/* 🌫️ 主呼吸 */
@keyframes fogFlow {
  0%   { transform: translate(0, 0); opacity: 0.5; }
  50%  { transform: translate(-10px, 8px); opacity: 0.7; }
  100% { transform: translate(0, 0); opacity: 0.5; }
}

/* 🌫️ 慢漂移 */
@keyframes fogDrift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-60px); }
}

/* 不均匀雾 */
.fog-veil::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 30% 60%, rgba(255,255,255,0.45), transparent 60%),
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.2), transparent 60%);

  mix-blend-mode: screen;
}

/* ✨ 中央微光（聚焦） */
.glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(circle at center, rgba(255,220,140,0.08), transparent 70%);
}

/* 🧿 点击区域 */
.hotspot {
  position: absolute;
  z-index: 3;
}

/* 📖 书 */
.book {
  position: absolute;

  bottom: 9.7%;
  left: 21%;

  width: 24%;

  pointer-events: auto;
}

.book-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

  /* ⭐ 温暖呼吸光（比牌弱一点） */
  animation: bookGlow 3.5s ease-in-out infinite;
}

@keyframes bookGlow {
  0%,100% {
    filter:
      drop-shadow(0 0 6px rgba(255,210,140,0.4))
      drop-shadow(0 0 12px rgba(255,210,140,0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 12px rgba(255,210,140,0.7))
      drop-shadow(0 0 24px rgba(255,210,140,0.5));
  }
}

/* 🃏 中央牌 */
.card {
  position: absolute;

  /* ⭐ 核心：用视觉对齐 */
  top: 49.5%;
  left: 50%;

  transform: translate(-50%, -50%) translateX(2px);

  /* ⭐ 用宽度控制比例 */
  width: 29%;   /* ← 这里之后可以微调 */

  aspect-ratio: 5 / 2;  /* 你的牌大概是横长 */

  pointer-events: auto;
}

.cards {
  width: 100%;
  height: 100%;
  object-fit: contain;

  display: block;

  animation: glowPulse 2s ease-in-out infinite;
  }

  /* 🖼 相片 */

  .photo {
  position: absolute;

  bottom: 5.15%;
  right: 23%;

  width: 17.3%;
 transform: rotate(1.7deg);  /* ⭐ 这里 */

  pointer-events: auto;
}

.photo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

  /* ⭐ 边缘发光（跟牌一样逻辑） */
  animation: photoGlow 3s ease-in-out infinite;
}

@keyframes photoGlow {
  0%,100% {
    filter:
      drop-shadow(0 0 6px rgba(255,200,150,0.4))
      drop-shadow(0 0 12px rgba(255,200,150,0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 12px rgba(255,200,150,0.8))
      drop-shadow(0 0 24px rgba(255,200,150,0.6));
  }
}

@keyframes glowPulse {
  0%,100% {
    filter:
      drop-shadow(0 0 6px rgba(180,220,255,0.6))
      drop-shadow(0 0 12px rgba(180,220,255,0.4))
      drop-shadow(0 0 24px rgba(180,220,255,0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 14px rgba(180,220,255,1))
      drop-shadow(0 0 28px rgba(180,220,255,0.8))
      drop-shadow(0 0 56px rgba(180,220,255,0.6));
  }
}

  .book::after,
.photo::after {
  content: "";
  position: absolute;
  inset: -8%;
  background: radial-gradient(rgba(255,220,140,0.25), transparent 70%);
  border-radius: 12px;
  opacity: 0.4;
  animation: softGlow 4s infinite;
}

@keyframes softGlow {
  0%,100% { opacity: 0.2; }
  50% { opacity: 0.5; }
}

@keyframes pulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* 📱 点击反馈 */
.hotspot:active {
  transform: scale(0.95);
}

/* 📝 一次性提示 */
.hint {
  position: fixed;
  bottom: 10%;
  width: 100%;
  text-align: center;
  color: #f5e6c8;
  font-size: 14px;
  opacity: 0.8;
  animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
  0% { opacity: 0.8; }
  70% { opacity: 0.8; }
  100% { opacity: 0; }
}

  /* 📱 直屏（手机 / 平板竖） */
@media (orientation: portrait) {

  /* 📖 书 */
  .book {
    bottom: 6%;
    left: 8%;
    width: 38%;
  }

  /* 🖼 相片 */
  .photo {
    bottom: 4%;
    right: 8%;
    width: 30%;
    transform: rotate(1.7deg);
  }

  /* 🃏 牌（主视觉要放大） */
  .card {
    top: 47%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
  }

}
  
</style>
</head>

<body>

<!-- 🌿 画面 -->
<div class="wrapper">
  <img src="index-tw-full.jpg" class="main-bg">

  <div class="glow"></div>
  <div class="fog-veil"></div>
  <div class="fog"></div>

  <div class="hotspot book" onclick="goMeaning()">
  <img src="index-book-tw.png" class="book-img">
</div>
  <div class="hotspot photo" onclick="goProfile()">
  <img src="index-photo.png" class="photo-img">
</div>
  <div class="hotspot card">
  <img src="index-card.png" class="cards">
</div>
</div>

<div class="hint">✨ 輕觸物件開始探索</div>

<!-- ⭐ script 放在最下面 -->
<script>
function goMeaning() {
  window.location.href = "meaning.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function openMenu() {
  alert("這裡之後放：一張 / 兩張 / 三張選單");
}
</script>

</body>
</html>
