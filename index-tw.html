
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* 🌌 背景氛围 */
body {
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url("forest.jpg");

  background-size: cover;
  background-position: center;
}

/* 🖼 主容器 */

.wrapper {
  position: relative;
  width: 100%;
  height: 100%;

  opacity: 0;
  filter: brightness(0.6) blur(6px);

  animation: sceneReveal 1.8s ease forwards;
  animation-delay: 6.8s;
}

@keyframes sceneReveal {
  0% {
    opacity: 0;
    filter: brightness(0.45) blur(10px);
  }

  15% {
    opacity: 0.15;
    filter: brightness(0.55) blur(8px);
  }

  30% {
    opacity: 0.35;
    filter: brightness(0.65) blur(6px);
  }

  45% {
    opacity: 0.55;
    filter: brightness(0.75) blur(4px);
  }

  60% {
    opacity: 0.7;
    filter: brightness(0.82) blur(3px);
  }

  75% {
    opacity: 0.85;
    filter: brightness(0.9) blur(2px);
  }

  90% {
    opacity: 0.95;
    filter: brightness(0.96) blur(1px);
  }

  100% {
    opacity: 1;
    filter: brightness(1) blur(0);
  }
}

@keyframes sceneFadeIn {
  to {
    opacity: 1;
  }
}

.main-bg {
  width: 100%;
  height: 100%;
  object-fit: contain;
  width: 100%;
  filter: brightness(0.5) contrast(1.2);
  z-index: 0;
}

/* ✨ 中央微光（聚焦） */
.glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(circle at center, rgba(255,220,140,0.08), transparent 70%);
}

/* 🧿 点击区域 */
.hotspot {
  position: absolute;
  z-index: 3;
}

/* 📖 书 */
.book {
  position: absolute;

  bottom: 9.7%;
  left: 21%;

  width: 24%;

  transform:

    rotate(-2.2deg)
    translateY(2px)
    translateX(-2px);

  pointer-events: auto;
}

.book-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

  animation: bookGlow 12s infinite;
}

@keyframes bookGlow {
  0%,25% {
    filter:
      drop-shadow(0 0 12px rgba(180,220,255,0.8))
      drop-shadow(0 0 30px rgba(180,220,255,1));
  }
  30%,100% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }
}
  
/* 🃏 中央牌 */
.card {
  position: absolute;

  /* ⭐ 核心：用视觉对齐 */
  top: 49.5%;
  left: 50.5%;

  transform: translate(-50%, -50%) translateX(2px);

  /* ⭐ 用宽度控制比例 */
  width: 30.5%;   /* ← 这里之后可以微调 */

  aspect-ratio: 5 / 2;  /* 你的牌大概是横长 */

  pointer-events: auto;
}

.cards {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  
  animation: cardGlow 12s infinite;
}

@keyframes cardGlow {
  0%,65% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }

  70%,95% {
    filter:
      drop-shadow(0 0 12px rgba(180,220,255,0.8))
      drop-shadow(0 0 30px rgba(180,220,255,1));
  }

  100% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }
}
  
  
  /* 🖼 相片 */

  .photo {
  position: absolute;

  bottom: 5.15%;
  right: 23%;

  width: 17.3%;
 transform: rotate(1.7deg);  /* ⭐ 这里 */

  pointer-events: auto;
}

.photo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

  /* ⭐ 边缘发光（跟牌一样逻辑） */
  animation: photoGlow 12s infinite;
}

@keyframes photoGlow {
  0%,30% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }

  35%,60% {
    filter:
      drop-shadow(0 0 12px rgba(180,220,255,0.8))
      drop-shadow(0 0 30px rgba(180,220,255,1));
  }

  65%,100% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }
}
@keyframes glowPulse {
  0%,100% {
    filter:
      drop-shadow(0 0 6px rgba(180,220,255,0.6))
      drop-shadow(0 0 12px rgba(180,220,255,0.4))
      drop-shadow(0 0 24px rgba(180,220,255,0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 14px rgba(180,220,255,1))
      drop-shadow(0 0 28px rgba(180,220,255,0.8))
      drop-shadow(0 0 56px rgba(180,220,255,0.6));
  }
}

.crystal {
  position: absolute;

  top: 1.5%;
  left: 50.5%;
  transform: translateX(-50%);

  width: 8%;
  aspect-ratio: 1 / 1;

  border-radius: 50%;
  z-index: 3;

  /* ⭐ 球体本体（更通透） */
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,1), transparent 35%),
    radial-gradient(circle at 70% 70%, rgba(180,220,255,0.55), transparent 70%),
    rgba(200,230,255,0.45);

  /* ⭐ 核心：外光 + 内光（恢复灵魂） */
  box-shadow:
    0 0 40px rgba(180,220,255,0.6),
    0 0 80px rgba(180,220,255,0.5),
    0 0 120px rgba(120,180,255,0.4),
    inset 0 0 30px rgba(255,255,255,0.6),
    inset 0 0 60px rgba(180,220,255,0.4);

  backdrop-filter: blur(4px);

  /* ⭐ 动画（浮 + 呼吸） */
  animation: crystalFloat 6s ease-in-out infinite,
             crystalPulse 4s ease-in-out infinite;
}
  
@keyframes crystalFloat {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

@keyframes crystalPulse {
  0%,100% {
    box-shadow:
      0 0 30px rgba(180,220,255,0.4),
      0 0 60px rgba(180,220,255,0.3),
      0 0 90px rgba(120,180,255,0.2),
      inset 0 0 20px rgba(255,255,255,0.5);
  }

  50% {
    box-shadow:
      0 0 50px rgba(180,220,255,0.8),
      0 0 100px rgba(180,220,255,0.7),
      0 0 160px rgba(120,180,255,0.6),
      inset 0 0 40px rgba(255,255,255,0.8);
  }
}
  
.crystal-text {
  position: absolute;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 13px;
  letter-spacing: 1px;

  color: #f3e2a3;

  /* ⭐ 关键：锐 + 光 分层 */
  text-shadow:
    0 0 1px rgba(0,0,0,0.9),   /* 锐边 */
    0 0 4px rgba(255,230,150,0.6),
    0 0 10px rgba(255,220,140,0.5),
    0 0 18px rgba(180,220,255,0.4);

  animation:
    crystalTextBreath 4s ease-in-out infinite,
    crystalTextFloat 6s ease-in-out infinite;
}

  @keyframes crystalTextGlow {
  0%,100% {
    filter: brightness(1);
  }
  50% {
    filter: brightness(1.6);
  }
}

  @keyframes crystalTextBreath {
  0%,100% {
    text-shadow:
      0 0 1px rgba(0,0,0,0.8),
      0 0 4px rgba(255,230,150,0.5),
      0 0 10px rgba(255,220,140,0.4),
      0 0 18px rgba(180,220,255,0.3);
  }

  50% {
    text-shadow:
      0 0 2px rgba(0,0,0,0.9),
      0 0 8px rgba(255,240,180,0.9),
      0 0 16px rgba(255,220,140,0.7),
      0 0 28px rgba(180,220,255,0.5);
  }
}

  @keyframes goldFlow {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

  @keyframes crystalTextFloat {
  0%,100% {
    transform: translateY(0);
    opacity: 0.9;
  }
  50% {
    transform: translateY(-2px);
    opacity: 1;
  }
}

  @keyframes crystalTextGlow {
  0%,100% {
    text-shadow:
      0 0 2px rgba(255,255,255,0.6),
      0 0 6px rgba(180,220,255,0.5),
      0 0 12px rgba(180,220,255,0.3);
  }

  50% {
    text-shadow:
      0 0 4px rgba(255,255,255,1),
      0 0 10px rgba(180,220,255,0.9),
      0 0 20px rgba(180,220,255,0.7);
  }
}
  
   .crystal-text span {
  position: absolute;
  opacity: 0;
}

@keyframes textCycle {
  0% {
    opacity: 0;
    transform: translateY(6px) scale(0.95);
    filter: blur(4px);
  }

  10% {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }

  20% {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }

  25% {
    opacity: 1;
    transform: translateY(0);
  }

  30% {
    opacity: 0;
    transform: translateY(-8px) scale(1.05);
    filter: blur(3px);
  }

  100% {
    opacity: 0;
  }
}
      
.t1 {
  animation: textCycle 12s infinite 0s;
}

.t2 {
  animation: textCycle 12s infinite 4s;
}

.t3 {
  animation: textCycle 12s infinite 8s;
}

 @keyframes text1 {
  0%,15% { opacity: 1; }
  20%,100% { opacity: 0; }
}

@keyframes text2 {
  30%,45% { opacity: 1; }
  50%,100% { opacity: 0; }
}
  
@keyframes text3 {
  60%,75% { opacity: 1; }
  80%,100% { opacity: 0; }
}

@keyframes textBreath {
  0%,100% {
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px rgba(255,255,255,0.3),
      0 0 15px rgba(180,220,255,0.4);
  }

  50% {
    text-shadow:
      0 0 6px rgba(255,255,255,0.9),
      0 0 16px rgba(255,255,255,0.7),
      0 0 30px rgba(180,220,255,0.9);
  }
}
  
  @keyframes glowCycle {
  0%   { filter: drop-shadow(0 0 30px rgba(180,220,255,1)); }
  25%  { filter: drop-shadow(0 0 30px rgba(180,220,255,1)); }

  33%  { filter: drop-shadow(0 0 6px rgba(180,220,255,0.2)); }
  100% { filter: drop-shadow(0 0 6px rgba(180,220,255,0.2)); }
}
  

/* 📱 点击反馈 */
.hotspot:active {
  transform: scale(0.95);
}

/* 📝 一次性提示 */
.hint {
  position: fixed;
  bottom: 10%;
  width: 100%;
  text-align: center;
  color: #f5e6c8;
  font-size: 14px;
  opacity: 0.8;
  animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
  0% { opacity: 0.8; }
  70% { opacity: 0.8; }
  100% { opacity: 0; }
}

  .sparkle {
  position: absolute;

  width: 3px;
  height: 3px;
  border-radius: 50%;

  background: radial-gradient(circle, #fff, rgba(255,255,255,0));

  /* ⭐ 在球内随机位置 */
  left: calc(20% + 60% * var(--x));
  top: calc(20% + 60% * var(--y));

  opacity: 0;

  /* ⭐ 发光 */
  box-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 12px rgba(180,220,255,0.8),
    0 0 20px rgba(120,180,255,0.6);

  animation: sparkleFloat 4s linear infinite;
  animation-delay: var(--d);
}

  @keyframes sparkleFloat {
  0% {
    transform: translateY(20px) scale(1);
    opacity: 0;
  }

  30% {
    opacity: 1;
  }

  100% {
    transform: translate(
      calc(50px - 100% * var(--x)),
      calc(50px - 100% * var(--y))
    ) scale(0.2);

    opacity: 0;
  }
}

  /* 📱 直屏（手机 / 平板竖） */
@media (orientation: portrait) {

  /* 📖 书 */
  .book {
    bottom: 20%;
    left: 3.7%;
    width: 39%;

    transform:

    rotate(-2.2deg)
    translateY(3px)
    translateX(-1px);

  }

  /* 🖼 相片 */
  .photo {
    bottom: 16.8%;
    right: 6.5%;
    width: 27.3%;
    transform: rotate(1.7deg);
  }

  /* 🃏 牌（主视觉要放大） */
  .card {
    top: 49.5%;
    left: 51%;
    transform: translate(-50%, -50%);
    width: 49.6%;
  }

  .crystal {
    top: 15%;        /* ⭐ 往下一点，避免贴顶 */
    left: 50.5%;
    width: 12%;       /* ⭐ 平板要放大，不然太小 */

    transform: translateX(-50%);
  }

  .crystal-text {
    font-size: 15px;  /* ⭐ 字稍微大一点才看得清 */
    letter-spacing: 1.5px;
  }

}

  /* ✨ 萤火虫容器 */
.fireflies {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

/* ✨ 单个萤火虫 */
.fireflies span {
  position: absolute;

  left: var(--x);
  top: var(--y);

  width: 4px;
  height: 4px;
  border-radius: 50%;

  background: radial-gradient(circle, #fff8cc, rgba(255,255,200,0));

  box-shadow:
    0 0 6px rgba(255,240,150,0.9),
    0 0 12px rgba(255,220,120,0.8),
    0 0 20px rgba(255,200,80,0.6);

  opacity: 0;

  animation:
    fireflyFloat 12s ease-in-out infinite,
    fireflyBlink 4s ease-in-out infinite;

  animation-delay: var(--d);
}

/* ✨ 飘动 */
@keyframes fireflyFloat {
  0%   { transform: translate(0, 0); }
  50%  { transform: translate(20px, -30px); }
  100% { transform: translate(-10px, 20px); }
}

/* ✨ 闪烁 */
@keyframes fireflyBlink {
  0%,100% { opacity: 0; }
  20%     { opacity: 1; }
  50%     { opacity: 0.6; }
  80%     { opacity: 1; }
}

  /* 🌑 黑幕 */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;

  animation: introFadeOut 2s ease forwards;
  animation-delay: 6.5s; /* ⭐ 总时长控制 */
}

/* ✨ 文字容器 */
.intro-text {
  text-align: center;
  color: #e8e0d0;
  font-size: 18px;
  letter-spacing: 2px;
}

/* 🌊 水波浮现效果 */
.line {
  opacity: 0;
  transform: translateY(20px);

  animation: textFlow 3s ease forwards;
  animation-delay: 2s;  /* ⭐ 这里控制“黑幕多久后才出字” */
}

.line.delay {
  animation-delay: 3s;
}

  @keyframes textFlow {
  0% {
    opacity: 0;
    transform: translateY(20px) blur(6px);
  }
  25% {
    opacity: 1;
    transform: translateY(0) blur(0);
  }
  65% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translateY(-10px) blur(4px);
  }
}

/* ✨ 文字浮现 */
@keyframes textAppear {
  0% {
    opacity: 0;
    transform: translateY(20px) blur(6px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) blur(0);
  }
}

/* 🌑 整体淡出 */
@keyframes introFadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}
  
</style>
</head>

<body>
<div class="intro">
  <div class="intro-text">
    <p class="line">與AI共同編織的雷諾曼世界，</p>
    <p class="line delay">歡迎來到——秘密集市!</p>
  </div>
</div>

<!-- 🌿 画面 -->
<div class="wrapper">
  <img src="index-tw-full.jpg" class="main-bg">

  <div class="glow">
  <div class="fireflies">
  <span style="--x:10%; --y:20%; --d:0s;"></span>
  <span style="--x:80%; --y:30%; --d:2s;"></span>
  <span style="--x:40%; --y:70%; --d:4s;"></span>
  <span style="--x:70%; --y:60%; --d:1s;"></span>
  <span style="--x:20%; --y:80%; --d:3s;"></span>
</div>
  </div>
  <div class="crystal">
  

  <div class="sparkle" style="--x:0.2; --y:0.3; --d:0s;"></div>

  <div class="sparkle" style="--x:0.7; --y:0.6; --d:1s;"></div>

  <div class="sparkle" style="--x:0.4; --y:0.8; --d:2s;"></div>

  <div class="sparkle" style="--x:0.6; --y:0.2; --d:3s;"></div>
    
  <div class="crystal-text">
    <span class="t1">命運圖譜</span>
    <span class="t2">幕後編織者</span>
    <span class="t3">開啟占卜</span>
  </div>
</div>

  <div class="hotspot book" onclick="goMeaning()">
  <img src="index-book-tw.png" class="book-img">
</div>
  <div class="hotspot photo" onclick="goProfile()">
  <img src="index-photo.png" class="photo-img">
</div>
  <div class="hotspot card">
  <img src="index-card.png" class="cards">
</div>
</div>

<div class="hint">✨ 輕觸物件開始探索</div>

<!-- ⭐ script 放在最下面 -->
<script>
function goMeaning() {
  window.location.href = "meaning.html";
}

function goProfile() {
  window.location.href = "profile.html";
}

function openMenu() {
  alert("這裡之後放：一張 / 兩張 / 三張選單");
}
</script>

</body>
</html>
