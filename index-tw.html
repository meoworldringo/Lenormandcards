<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root {
  --start-delay: 2s;
}
  
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

/* 🌌 背景氛围 */
body {
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
    url("forest.jpg");

  background-size: cover;
  background-position: center;
}

/* 🖼 主容器 */

.wrapper {
  position: relative;
  width: 100%;
  height: 100%;

  opacity: 0;
  filter: brightness(0.6) blur(6px);

  animation: sceneReveal 1.8s ease forwards;
}

/* ⭐ 一开始全部动画关闭 */
.wrapper * {
  animation: none !important;
}

  .wrapper.active * {
  animation-delay: var(--start-delay) !important;

}

  .wrapper.start .book-img {
  animation: bookGlow 12s infinite;
}

.wrapper.start .cards {
  animation: cardGlow 12s infinite;
}

.wrapper.start .photo-img {
  animation: photoGlow 12s infinite;
}

.wrapper.start .crystal {
  animation: crystalPulse 4s ease-in-out infinite;
}

.wrapper.start .t1 {
  animation: t1show 12s infinite;
}
.wrapper.start .t2 {
  animation: t2show 12s infinite;
}
.wrapper.start .t3 {
  animation: t3show 12s infinite;
}

@keyframes sceneReveal {
  0% {
    opacity: 0;
    filter: brightness(0.45) blur(10px);
  }

  15% {
    opacity: 0.15;
    filter: brightness(0.55) blur(8px);
  }

  30% {
    opacity: 0.35;
    filter: brightness(0.65) blur(6px);
  }

  45% {
    opacity: 0.55;
    filter: brightness(0.75) blur(4px);
  }

  60% {
    opacity: 0.7;
    filter: brightness(0.82) blur(3px);
  }

  75% {
    opacity: 0.85;
    filter: brightness(0.9) blur(2px);
  }

  90% {
    opacity: 0.95;
    filter: brightness(0.96) blur(1px);
  }

  100% {
    opacity: 1;
    filter: brightness(1) blur(0);
  }
}

@keyframes sceneFadeIn {
  to {
    opacity: 1;
  }
}

.main-bg {
  width: 100%;
  height: 100%;
  object-fit: contain;
  width: 100%;
  filter: brightness(0.5) contrast(1.2);
}

/* 🌫️ 第二层：真实雾纹 */
.fog::before {
  content: "";
  position: absolute;
  inset: -20%;
  
  background: url("https://images.unsplash.com/photo-1549887534-1541e9326642?q=80&w=1200&auto=format&fit=crop");
  background-size: cover;
  
  opacity: 0.12;
  mix-blend-mode: screen;

  filter: blur(40px);
  
  animation: fogDrift 30s linear infinite;
}

@keyframes fogMove {
  0%   { transform: translate(0,0); opacity: 0.6; }
  50%  { transform: translate(-20px, 15px); opacity: 0.8; }
  100% { transform: translate(0,0); opacity: 0.6; }
}

@keyframes fogDrift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-100px); }
}

.fog {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;

  background:
    radial-gradient(circle at 20% 80%, rgba(255,255,255,0.25), transparent 60%),
    radial-gradient(circle at 80% 20%, rgba(255,255,255,0.18), transparent 60%),
    radial-gradient(circle at 50% 100%, rgba(255,255,255,0.12), transparent 70%);

  filter: blur(25px);

  mix-blend-mode: screen;

  animation: fogMove 20s ease-in-out infinite;
}

  /* 🌫️ 柔边（避免光圈） */
  mask-image: radial-gradient(circle at center,
    transparent 30%,
    rgba(0,0,0,0.2) 50%,
    rgba(0,0,0,0.6) 70%,
    black 90%
  );

  -webkit-mask-image: radial-gradient(circle at center,
    transparent 30%,
    rgba(0,0,0,0.2) 50%,
    rgba(0,0,0,0.6) 70%,
    black 90%
  );

  /* ⭐ 加流动 */
  animation: fogFlow 20s ease-in-out infinite;
}

/* 🌫️ 第二层雾（增加流动层次） */
/* 🌫️ 第二层（反方向） */

.fog-veil::before {
  content: "";
  position: absolute;
  inset: -20%;
  background: url("https://images.unsplash.com/photo-1520895915443-8f1f4c52f7a3?q=80&w=1200&auto=format&fit=crop");
  background-size: cover;
  opacity: 0.12;
  filter: blur(50px);
  mix-blend-mode: screen;
  animation: fogMoveX2 60s linear infinite,
             fogMoveY2 35s ease-in-out infinite;

}

  /* 🌫️ 横向漂 */

@keyframes fogMoveX {

  0% { transform: translateX(0); }

  100% { transform: translateX(-120px); }

}

@keyframes fogMoveX2 {

  0% { transform: translateX(0); }

  100% { transform: translateX(120px); }

}

/* 🌫️ 上下浮 */

@keyframes fogMoveY {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(40px); }
}

@keyframes fogMoveY2 {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-30px); }
}

/* 🌫️ 主呼吸 */
@keyframes fogFlow {
  0%   { transform: translate(0, 0); opacity: 0.5; }
  50%  { transform: translate(-10px, 8px); opacity: 0.7; }
  100% { transform: translate(0, 0); opacity: 0.5; }
}

/* 🌫️ 慢漂移 */
@keyframes fogDrift {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-60px); }
}

/* 不均匀雾 */
.fog-veil::after {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 30% 60%, rgba(255,255,255,0.45), transparent 60%),
    radial-gradient(circle at 70% 40%, rgba(255,255,255,0.2), transparent 60%);

  mix-blend-mode: screen;
}

/* ✨ 中央微光（聚焦） */
.glow {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  background: radial-gradient(circle at center, rgba(255,220,140,0.08), transparent 70%);
}

/* 🧿 点击区域 */
.hotspot {
  position: absolute;
  z-index: 3;
}

/* 📖 书 */
.book {
  position: absolute;

  bottom: 9.7%;
  left: 21%;

  width: 24%;

  transform:

    rotate(-2.2deg)
    translateY(2px)
    translateX(-2px);

  pointer-events: auto;
}

.book-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

}

@keyframes bookGlow {
  0%,25% {
    filter:
      drop-shadow(0 0 12px rgba(180,220,255,0.8))
      drop-shadow(0 0 30px rgba(180,220,255,1));
  }
  30%,100% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }
}
  
/* 🃏 中央牌 */
.card {
  position: absolute;

  /* ⭐ 核心：用视觉对齐 */
  top: 49.5%;
  left: 50.5%;

  transform: translate(-50%, -50%) translateX(2px);

  /* ⭐ 用宽度控制比例 */
  width: 30.5%;   /* ← 这里之后可以微调 */

  aspect-ratio: 5 / 2;  /* 你的牌大概是横长 */

  pointer-events: auto;
}

.cards {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

}

@keyframes cardGlow {
  0%,65% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }

  70%,95% {
    filter:
      drop-shadow(0 0 12px rgba(180,220,255,0.8))
      drop-shadow(0 0 30px rgba(180,220,255,1));
  }

  100% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }
}
  
  
  /* 🖼 相片 */

  .photo {
  position: absolute;

  bottom: 5.15%;
  right: 23%;

  width: 17.3%;
 transform: rotate(1.7deg);  /* ⭐ 这里 */

  pointer-events: auto;
}

.photo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

}

@keyframes photoGlow {
  0%,30% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }

  35%,60% {
    filter:
      drop-shadow(0 0 12px rgba(180,220,255,0.8))
      drop-shadow(0 0 30px rgba(180,220,255,1));
  }

  65%,100% {
    filter: drop-shadow(0 0 6px rgba(180,220,255,0.2));
  }
}
@keyframes glowPulse {
  0%,100% {
    filter:
      drop-shadow(0 0 6px rgba(180,220,255,0.6))
      drop-shadow(0 0 12px rgba(180,220,255,0.4))
      drop-shadow(0 0 24px rgba(180,220,255,0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 14px rgba(180,220,255,1))
      drop-shadow(0 0 28px rgba(180,220,255,0.8))
      drop-shadow(0 0 56px rgba(180,220,255,0.6));
  }
}

  .crystal {
  position: absolute;

  top: 1.5%;      /* ⭐ 之后微调 */
  left: 50.5%;
  transform: translateX(-50%);

  width: 8%;   /* ⭐ 之后微调 */
  aspect-ratio: 1 / 1;

  border-radius: 50%;

  z-index: 3;

  /* ⭐ 球体本体 */
  background:
  radial-gradient(circle at 30% 30%, rgba(255,255,255,1), transparent 35%),
  radial-gradient(circle at 70% 70%, rgba(180,220,255,0.55), transparent 70%),
  rgba(200,230,255,0.45);  /* ⭐ 从 0.25 → 提高到 0.45 */
    
  /* ⭐ 外光 + 内光 */
  box-shadow:

    0 0 40px rgba(180,220,255,0.6),
    0 0 80px rgba(180,220,255,0.5),
    0 0 120px rgba(120,180,255,0.4),   /* ⭐ 外扩光 */
    inset 0 0 30px rgba(255,255,255,0.6),
    inset 0 0 60px rgba(180,220,255,0.4);  /* ⭐ 内发光 */

  /* ⭐ 关键：盖掉下面旧球 */
  backdrop-filter: blur(4px);
}
  

.crystal-text {
  position: absolute;
  inset: 0;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 13px;
  letter-spacing: 1px;

  /* ⭐ 字本体：暖金（不是亮金） */
  color: #f3e2a3;

  /* ⭐ 核心：多层发光（外魔法 + 内锐度） */
  text-shadow:
    0 0 1px rgba(0,0,0,0.8),      /* ⭐ 锐化边缘 */
    0 0 4px rgba(255,230,150,0.6),
    0 0 10px rgba(255,220,140,0.5),
    0 0 18px rgba(180,220,255,0.4);

  /* ⭐ 微呼吸（让它不像UI字） */
  animation:

    crystalTextBreath 4s ease-in-out infinite,
    crystalTextGlow 3s ease-in-out infinite,
    crystalTextFloat 6s ease-in-out infinite;
}

  @keyframes crystalTextBreath {
  0%,100% {
    text-shadow:
      0 0 1px rgba(0,0,0,0.8),
      0 0 4px rgba(255,230,150,0.5),
      0 0 10px rgba(255,220,140,0.4),
      0 0 18px rgba(180,220,255,0.3);
  }

  50% {
    text-shadow:
      0 0 2px rgba(0,0,0,0.9),
      0 0 8px rgba(255,240,180,0.9),
      0 0 16px rgba(255,220,140,0.7),
      0 0 28px rgba(180,220,255,0.5);
  }
}

  .crystal::after {
  content: "";
  position: absolute;
  inset: 5%;
  border-radius: 50%;

  background:
    conic-gradient(
      from 0deg,
      rgba(180,220,255,0.15),
      transparent 30%,
      rgba(255,255,255,0.1),
      transparent 60%,
      rgba(120,180,255,0.15)
    );

  filter: blur(20px);
  opacity: 0.5;

  animation: galaxySpin 25s linear infinite;
}

  @keyframes galaxySpin {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
  

  @keyframes corePulse {
  0%,100% { opacity: 0.6; transform: scale(0.9); }
  50% { opacity: 1; transform: scale(1.1); }
}

  @keyframes goldFlow {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

  @keyframes crystalTextFloat {
  0%,100% {
    transform: translateY(0);
    opacity: 0.9;
  }
  50% {
    transform: translateY(-2px);
    opacity: 1;
  }
}

  
  @keyframes crystalTextShimmer {
  0%,100% {
    text-shadow:
      0 0 2px rgba(255,255,255,0.6),
      0 0 6px rgba(180,220,255,0.5),
      0 0 12px rgba(180,220,255,0.3);
  }

  50% {
    text-shadow:
      0 0 4px rgba(255,255,255,1),
      0 0 10px rgba(180,220,255,0.9),
      0 0 20px rgba(180,220,255,0.7);
  }
}

  @keyframes crystalTextGlow {
  0%,100% {
    filter: brightness(1);
  }
  50% {
    filter: brightness(1.6);
  }
}
  
  
 .crystal-text span {
  position: absolute;
  opacity: 0;
}

@keyframes textCycle {
  0% {
    opacity: 0;
  }

  8% {   /* ⭐ 新增：开场空窗 */
    opacity: 0;
  }

  18% {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }

  30% {
    opacity: 1;
  }

  40% {
    opacity: 0;
  }

  100% {
    opacity: 0;
  }
}
      
@keyframes textCycle {

  /* ❄️ 全部默认隐藏 */
  0%, 100% {
    opacity: 0;
  }

}

/* 👉 每个文字自己定义“出现区间” */


@keyframes t1show {
  0%, 20% { opacity: 0; }
  25%, 40% { opacity: 1; }
  45%,100% { opacity: 0; }
}


@keyframes t2show {
  0%, 40% { opacity: 0; }
  45%, 60% { opacity: 1; }
  65%,100% { opacity: 0; }
}


@keyframes t3show {
  0%, 60% { opacity: 0; }
  65%, 80% { opacity: 1; }
  85%,100% { opacity: 0; }
}

 @keyframes text1 {
  0%,15% { opacity: 1; }
  20%,100% { opacity: 0; }
}

@keyframes text2 {
  30%,45% { opacity: 1; }
  50%,100% { opacity: 0; }
}
  
@keyframes text3 {
  60%,75% { opacity: 1; }
  80%,100% { opacity: 0; }
}

@keyframes textBreath {
  0%,100% {
    text-shadow:
      0 0 4px rgba(255,255,255,0.5),
      0 0 10px rgba(255,255,255,0.3),
      0 0 15px rgba(180,220,255,0.4);
  }

  50% {
    text-shadow:
      0 0 6px rgba(255,255,255,0.9),
      0 0 16px rgba(255,255,255,0.7),
      0 0 30px rgba(180,220,255,0.9);
  }
}
  
  @keyframes glowCycle {
  0%   { filter: drop-shadow(0 0 30px rgba(180,220,255,1)); }
  25%  { filter: drop-shadow(0 0 30px rgba(180,220,255,1)); }

  33%  { filter: drop-shadow(0 0 6px rgba(180,220,255,0.2)); }
  100% { filter: drop-shadow(0 0 6px rgba(180,220,255,0.2)); }
}

  .crystal::before {
  content: "";
  position: absolute;
  inset: 10%;
  border-radius: 50%;

  background:
    radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15), transparent 60%),
    radial-gradient(circle at 70% 60%, rgba(180,220,255,0.2), transparent 70%),
    radial-gradient(circle at 50% 50%, rgba(120,180,255,0.15), transparent 80%);

  filter: blur(12px);
  opacity: 0.6;

  animation: nebulaFlow 20s linear infinite;
}

  @keyframes nebulaFlow {
  0% {
    transform: translate(0,0) scale(1);
  }
  50% {
    transform: translate(-10px, 8px) scale(1.1);
  }
  100% {
    transform: translate(0,0) scale(1);
  }
}
  
  @keyframes sparkleOrbit {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  50% {
    transform: translate(
      calc(20px - 40px * var(--x)),
      calc(20px - 40px * var(--y))
    ) scale(0.8);
  }

  100% {
    transform: translate(
      calc(-30px + 60px * var(--x)),
      calc(-30px + 60px * var(--y))
    ) scale(0.3);

    opacity: 0;
  }
}

  
  
  .book::after,
.photo::after {
  content: "";
  position: absolute;
  inset: -8%;
  background: radial-gradient(rgba(255,220,140,0.25), transparent 70%);
  border-radius: 12px;
  opacity: 0.4;
  animation: softGlow 4s infinite;
}

@keyframes softGlow {
  0%,100% { opacity: 0.2; }
  50% { opacity: 0.5; }
}

@keyframes pulse {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* 📱 点击反馈 */
.hotspot:active {
  transform: scale(0.95);
}

/* 📝 一次性提示 */
.hint {
  position: fixed;
  bottom: 10%;
  width: 100%;
  text-align: center;
  color: #f5e6c8;
  font-size: 14px;
  opacity: 0.8;
  animation: fadeOut 3s forwards;
}

@keyframes fadeOut {
  0% { opacity: 0.8; }
  70% { opacity: 0.8; }
  100% { opacity: 0; }
}

.sparkle {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;

  background: radial-gradient(circle, #fff, rgba(255,255,255,0));

  left: calc(20% + 60% * var(--x));
  top: calc(20% + 60% * var(--y));

  opacity: 0;

  box-shadow:
    0 0 6px rgba(255,255,255,0.9),
    0 0 12px rgba(180,220,255,0.8),
    0 0 20px rgba(120,180,255,0.6);

  animation: sparkleOrbit 6s linear infinite;
  animation-delay: var(--d);
}

  @keyframes sparkleFloat {
  0% {
    transform: translateY(20px) scale(1);
    opacity: 0;
  }

  30% {
    opacity: 1;
  }

  100% {
    transform: translate(
      calc(50px - 100% * var(--x)),
      calc(50px - 100% * var(--y))
    ) scale(0.2);

    opacity: 0;
  }
}

  /* 📱 直屏（手机 / 平板竖） */
@media (orientation: portrait) {

  /* 📖 书 */
  .book {
    bottom: 20%;
    left: 3.7%;
    width: 39%;

    transform:

    rotate(-2.2deg)
    translateY(3px)
    translateX(-1px);

  }

  /* 🖼 相片 */
  .photo {
    bottom: 16.8%;
    right: 6.5%;
    width: 27.3%;
    transform: rotate(1.7deg);
  }

  /* 🃏 牌（主视觉要放大） */
  .card {
    top: 49.5%;
    left: 51%;
    transform: translate(-50%, -50%);
    width: 49.6%;
  }

  .crystal {
    top: 15%;        /* ⭐ 往下一点，避免贴顶 */
    left: 50.5%;
    width: 12%;       /* ⭐ 平板要放大，不然太小 */

    transform: translateX(-50%);
  }

  .crystal-text {
    font-size: 15px;  /* ⭐ 字稍微大一点才看得清 */
    letter-spacing: 1.5px;
  }

}



  /* 🌑 黑幕 */
.intro {
  position: fixed;
  inset: 0;
  background: black;
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;

  animation: introFadeOut 2s ease forwards;
  animation-delay: 6.5s; /* ⭐ 总时长控制 */
}

/* ✨ 文字容器 */
.intro-text {
  text-align: center;
  color: #e8e0d0;
  font-size: 18px;
  letter-spacing: 2px;
}

/* 🌊 水波浮现效果 */
.line {
  opacity: 0;
  transform: translateY(20px);

  animation: textFlow 3s ease forwards;
  animation-delay: 2s;  /* ⭐ 这里控制“黑幕多久后才出字” */
}

.line.delay {
  animation-delay: 3s;
}

  @keyframes textFlow {
  0% {
    opacity: 0;
    transform: translateY(20px) blur(6px);
  }
  25% {
    opacity: 1;
    transform: translateY(0) blur(0);
  }
  65% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translateY(-10px) blur(4px);
  }
}

/* ✨ 文字浮现 */
@keyframes textAppear {
  0% {
    opacity: 0;
    transform: translateY(20px) blur(6px);
  }
  100% {
    opacity: 1;
    transform: translateY(0) blur(0);
  }
}

/* 🌑 整体淡出 */
@keyframes introFadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

  /* ⭐ 启动后恢复动画 */
.wrapper.active .book-img {
  animation: bookGlow 12s infinite !important;
}

.wrapper.active .cards {
  animation: cardGlow 12s infinite !important;
}

.wrapper.active .photo-img {
  animation: photoGlow 12s infinite !important;
}

.wrapper.active .crystal {
  animation: crystalPulse 4s ease-in-out infinite !important;
}

.wrapper.active .t1 {
  animation: t1show 12s infinite !important;
}
.wrapper.active .t2 {
  animation: t2show 12s infinite !important;
}
.wrapper.active .t3 {
  animation: t3show 12s infinite !important;
}
  
</style>
</head>

<body>
<div class="intro">
  <div class="intro-text">
    <p class="line">與AI共同編織的雷諾曼世界，</p>
    <p class="line delay">歡迎來到——秘密集市!</p>
  </div>
</div>
