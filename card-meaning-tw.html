
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/ *🌑 暗层（变淡！）*/
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); / ⭐ 原本太黑 /
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 20%;
  left: 18%;
  width: 26%;

  color: rgba(70, 50, 25, 0.75);  /* ⭐ 更淡 */

  font-family: "Hiragino Mincho ProN", serif;

  line-height: 1.8;               /* ⭐ 拉开（关键） */
  letter-spacing: 0.3px;            /* ⭐ 明显变化 */

  font-size: clamp(13px, 1.4vw, 17px);
  font-weight: 400;               /* ⭐ 变轻 */

  text-align: justify;            /* ⭐ 像书（关键） */
}

.book-text p {
  margin: 12px 0;
}

.title {
  display: block;
  text-align: center;

  font-size: 1.3em;
  letter-spacing: 0.5px;  /* ⭐ 收紧 */
  margin-bottom: 14px;

  color: rgba(50, 35, 20, 0.9);
}

  .zh {
  font-family: inherit;
}

.en {
  font-family: inherit;
  font-style: normal;
  margin-left: 4px;
  opacity: 0.75;
}

/*📱 手机（之后再开） */
@media (max-width: 600px) {
  .book-double { display: none; }
  .book-single { display: block; }

  .book-wrapper {
    width: 85vw;
  }

  .book-text {
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    top: 20%;
  }
}
.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;

  background: radial-gradient(
    circle,
    rgba(255,220,120,0.9) 0%,
    rgba(255,220,120,0.4) 40%,
    rgba(255,220,120,0) 80%
  );

  border-radius: 50%;

  box-shadow:
    0 0 6px rgba(255,220,120,0.6),
    0 0 12px rgba(180,200,255,0.25);

  filter: blur(0.8px);

  /* ⭐ 就是这行不见了！ */
  animation: fireflyFloat 12s linear infinite;
}

@keyframes fireflyFloat {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateY(-60px); opacity: 0.8; }
  100% { transform: translateY(-120px); opacity: 0; }
}
  .nav {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50%;
  cursor: pointer;
  z-index: 6;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

  .book-text.left {
  left: 18%;
  width: 26%;
}

.book-text.right {
  left: 56%;
  width: 26%;
}

</style>
</head>

<body>

<div class="fireflies"></div>

<div class="book-wrapper">
  <div class="nav left" onclick="prevPage()"></div>
<div class="nav right" onclick="nextPage()"></div>

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

  <div class="book-text left" id="leftPage"></div>
<div class="book-text right" id="rightPage"></div>

</div>
<script>
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";

  /* ⭐ 每一只萤火虫不同节奏 */
  f.style.animationDelay = Math.random() * 10 + "s";
  f.style.animationDuration = (8 + Math.random() * 6) + "s";

  fireflyContainer.appendChild(f);
}

  const pages = [
  { title: "1. 騎士", text: "兔子騎士和同伴帶上搭順風車的小烏龜，準備出發！<br>不論沼澤還是陸地，鱷魚大哥，衝鴨～～<br><br>關鍵詞：消息、行動、來訪" },
  { title: "2. 四葉草", text: "街道的石磚縫，長了一株四葉草。<br>人們不停駐的匆匆走過——<br>噓，三花貓發現它了！<br><br>關鍵詞：幸運、機會、偶然" },
  { title: "3. 船", text: "過去是船，現在添了飛機，未來可能還有宇宙飛梭！<br>再到更久遠的未來————<br>嘿，說不定有天我們打開門就能到任何地方。<br>你說是不？<br><br>關鍵詞：旅行、移動、遠方" },
  { title: "4. 房屋", text: "關於安穩與歸屬的象徵。<br><br>關鍵詞：家庭、安全、基礎" },

  { title: "5.1 世界之樹", text: "連結天地萬物的存在。<br><br>關鍵詞：生命、連結、成長" },
  { title: "5.2 精神之樹", text: "內在的信念與精神支柱。<br><br>關鍵詞：信念、內在、意識" },

  { title: "6. 雲", text: "模糊與不確定。<br><br>關鍵詞：困惑、不明、陰影" },
  { title: "7. 蛇", text: "智慧與曲折。<br><br>關鍵詞：策略、誘惑、複雜" },
  { title: "8. 棺材", text: "結束與轉變。<br><br>關鍵詞：終結、釋放、轉化" },
  { title: "9. 花束", text: "喜悅與禮物。<br><br>關鍵詞：祝福、幸福、人際" },

  { title: "10. 鐮刀", text: "快速的決斷與切斷。<br><br>關鍵詞：決定、危險、收割" },
  { title: "11. 鞭子", text: "衝突與重複。<br><br>關鍵詞：爭執、壓力、循環" },
  { title: "12. 鳥", text: "交流與不安。<br><br>關鍵詞：溝通、焦慮、消息" },

  { title: "13.1 i人小孩", text: "內向與觀察。<br><br>關鍵詞：內省、安靜、感受" },
  { title: "13.2 e人小孩", text: "外向與活力。<br><br>關鍵詞：行動、好奇、表達" },

  { title: "14. 狐狸", text: "聰明與策略。<br><br>關鍵詞：機智、防備、判斷" },
  { title: "15. 熊", text: "力量與權威。<br><br>關鍵詞：力量、控制、資源" },
  { title: "16. 星星", text: "希望與指引。<br><br>關鍵詞：靈感、夢想、方向" },
  { title: "17. 鸛鳥", text: "變化與轉變。<br><br>關鍵詞：轉機、更新、移動" },
  { title: "18. 狗", text: "忠誠與信任。<br><br>關鍵詞：朋友、支持、可靠" },

  { title: "19. 塔", text: "距離與孤立。<br><br>關鍵詞：權威、孤獨、界線" },
  { title: "20. 花園", text: "社交與公開。<br><br>關鍵詞：群體、社會、曝光" },
  { title: "21. 山", text: "阻礙與困難。<br><br>關鍵詞：障礙、延遲、挑戰" },
  { title: "22. 十字路口", text: "選擇與分岔。<br><br>關鍵詞：決定、方向、分歧" },
  { title: "23. 老鼠", text: "消耗與焦慮。<br><br>關鍵詞：流失、壓力、侵蝕" },

  { title: "24.1 燃燒之心", text: "熱烈與激情。<br><br>關鍵詞：愛、衝動、火焰" },
  { title: "24.2 靈魂之心", text: "深層的情感連結。<br><br>關鍵詞：靈魂、共鳴、深情" },
  { title: "24.3 歲月之心", text: "長久與沉澱。<br><br>關鍵詞：時間、累積、穩定" },

  { title: "25. 戒指", text: "承諾與關係。<br><br>關鍵詞：契約、連結、循環" },
  { title: "26. 書本", text: "秘密與知識。<br><br>關鍵詞：隱藏、學習、未知" },
  { title: "27. 信件", text: "訊息與傳遞。<br><br>關鍵詞：消息、通知、交流" },
  { title: "28. 男人", text: "男性能量或某位男性。<br><br>關鍵詞：行動、主體" },
  { title: "29. 女人", text: "女性能量或某位女性。<br><br>關鍵詞：感受、關係" },

  { title: "30. 百合花", text: "成熟與平靜。<br><br>關鍵詞：經驗、純潔、和諧" },
  { title: "31. 太陽", text: "成功與能量。<br><br>關鍵詞：光明、成就、活力" },
  { title: "32. 月亮", text: "情緒與潛意識。<br><br>關鍵詞：直覺、情感、夜晚" },
  { title: "33. 鑰匙", text: "關鍵與解答。<br><br>關鍵詞：重要、突破、開啟" },
  { title: "34. 魚", text: "流動與財富。<br><br>關鍵詞：資源、自由、金錢" },
  { title: "35. 錨", text: "穩定與固定。<br><br>關鍵詞：持續、安全、停留" },
  { title: "36. 十字架", text: "命運與承擔。<br><br>關鍵詞：責任、考驗、信念" }
];
  
let currentPage = 0;

function renderPage() {
  const left = pages[currentPage * 2];
  const right = pages[currentPage * 2 + 1];

  document.getElementById("leftPage").innerHTML = left ? `
    <b class="title">${left.title}</b>
    <p>${left.text}</p>
  ` : "";

  document.getElementById("rightPage").innerHTML = right ? `
    <b class="title">${right.title}</b>
    <p>${right.text}</p>
  ` : "";
}

function nextPage() {
  if ((currentPage + 1) * 2 < pages.length) {
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
  }
}

renderPage();
  
</script>
</body>
</html>
