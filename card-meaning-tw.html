<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Card Meanings</title>

<style>
body {
  margin: 0;
  background: #0B0F14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 📖 整本书 */
.book {
  width: 90%;
  max-width: 700px;
}

/* 📜 书页 */
.page {
  padding: 60px 50px;

  background: radial-gradient(
    ellipse at center,
    #f3e6c9 0%,
    #e2cf9f 100%
  );

  box-shadow:
    inset 0 0 80px rgba(0,0,0,0.35),
    0 20px 60px rgba(0,0,0,0.5);

  border-radius: 6px;

  color: #3a2f1b;
  font-family: serif;
  line-height: 1.8;
}

.page h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

.page p {
  font-size: 16px;
}
</style>
</head>

<body>

<div class="book">
  <div class="page">
    <h1>秘密のバザール</h1>
    <p>
      在靜謐的命運之中，  
      每一張牌都低聲訴說著尚未被看見的真相。
    </p>
  </div>
</div>

</body>
</html>
