
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 /
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/ 🌑 暗层 /
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.65);
  z-index: 0;
}

/ 📖 核心容器（关键！） /
.book-wrapper {
  position: relative;
  width: min(92vw, 900px);
  margin-top: 40px;
  z-index: 2;
}

/ 📖 图片强制规则（关键！） /
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/ 👉 默认隐藏单页 /
.book-single {
  display: none;
}

/ 📱 手机切换 /
@media (max-width: 600px) {
  .book-double { display: none; }
  .book-single { display: block; }
}

/ 📝 文字（绝对贴书） /
.book-text {
  position: absolute;

  / ⭐ 左页区域（核心） /
  top: 18%;
  left: 24%;
  width: 23%;

  color: #3a2e1f;
  font-family: serif;
  line-height: 1.6;
  font-size: clamp(12px, 1.4vw, 16px);
}

/ 📱 手机 */
@media (max-width: 600px) {
  .book-text {
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    top: 20%;
  }
}

</style>
</head>

<body>

<div class="book-wrapper">

  <!-- 双页 -->
  <img src="book-open-v1.png" class="book-double">

  <!-- 单页 -->
  <img src="book-open-v2.png" class="book-single">

  <!-- 文字 -->
  <div class="book-text">
    <b>狐狸（Fox）</b><br><br>
    代表聪明、谨慎与策略。<br>
    有时也暗示算计与防备。<br><br>
    当它出现时，提醒你保持警觉，<br>
    用智慧而非冲动行动。
  </div>

</div>

</body>
</
