<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book</title>

<style>
body {
  margin: 0;
  background: #0B0F14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 📖 整本书 */
.book {
  display: flex;
  width: 90%;
  max-width: 900px;
  height: 70vh;
  position: relative;
}

/* 📜 每一页 */
.page {
  flex: 1;
  padding: 70px 60px;

  /* 🟤 羊皮纸底色（偏脏、偏暖） */
  background:
    radial-gradient(circle at 50% 40%, #f2e6c9 0%, #d9c79a 60%, #bfa87a 100%);

  /* 🌫 不均匀脏感（关键！！！） */
  background-blend-mode: multiply;

  /* 🌑 内部旧感 + 厚度 */
  box-shadow:
    inset 0 0 120px rgba(0,0,0,0.6),
    inset 0 0 40px rgba(120,90,50,0.25);

  color: #2a1f10;
  font-family: serif;
  line-height: 1.9;

  position: relative;
}

  .page::before {
  content: "";
  position: absolute;
  inset: 0;

  background:
    radial-gradient(circle at 20% 30%, rgba(120,90,50,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,90,50,0.12), transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1), transparent 60%);

  mix-blend-mode: multiply;

  pointer-events: none;
}

  .page::after {
  content: "";
  position: absolute;
  inset: 0;

  box-shadow:
    inset 0 0 60px rgba(0,0,0,0.5),
    inset 0 0 120px rgba(80,60,30,0.4);

  pointer-events: none;
}
  

/* 📖 左页 */
.left {
  border-radius: 8px 0 0 8px;
}

/* 📖 右页 */
.right {
  border-radius: 0 8px 8px 0;
}

/* 🌑 中间书脊（最关键） */
.book::before {
  background: radial-gradient(
    ellipse at center,
    rgba(0,0,0,0.8),
    rgba(60,40,20,0.4),
    transparent 70%
  );
}

/* 标题 */
h1 {
  margin-top: 0;
}
</style>
</head>

<body>

<div class="book">

  <div class="page left">
    <h1>Book of Secrets</h1>
    <p>
      在命運的縫隙之中，  
      每一張牌都靜靜等待被翻開。
    </p>
  </div>

  <div class="page right">
    <h1>The Card</h1>
    <p>
      Each symbol holds a path,  
      each meaning unfolds in silence.
    </p>
  </div>

</div>

</body>
</html>
