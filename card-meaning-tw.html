
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/ *🌑 暗层（变淡！）*/
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); / ⭐ 原本太黑 /
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 20%;
  left: 18%;
  width: 26%;

  color: rgba(70, 50, 25, 0.75);  /* ⭐ 更淡 */

  font-family: "Hiragino Mincho ProN", serif;

  line-height: 1.8;               /* ⭐ 拉开（关键） */
  letter-spacing: 0.3px;            /* ⭐ 明显变化 */

  font-size: clamp(13px, 1.4vw, 17px);
  font-weight: 400;               /* ⭐ 变轻 */

  text-align: justify;            /* ⭐ 像书（关键） */
}

.book-text p {
  margin: 12px 0;
}

.title {
  display: block;
  text-align: center;

  font-size: 1.3em;
  letter-spacing: 0.5px;  /* ⭐ 收紧 */
  margin-bottom: 14px;

  color: rgba(50, 35, 20, 0.9);
}

  .zh {
  font-family: inherit;
}

.en {
  font-family: inherit;
  font-style: normal;
  margin-left: 4px;
  opacity: 0.75;
}

/*📱 手机（之后再开） */
@media (max-width: 600px) {
  .book-double { display: none; }
  .book-single { display: block; }

  .book-wrapper {
    width: 85vw;
  }

  .book-text {
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    top: 20%;
  }
}
.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;

  background: radial-gradient(
    circle,
    rgba(255,220,120,0.9) 0%,
    rgba(255,220,120,0.4) 40%,
    rgba(255,220,120,0) 80%
  );

  border-radius: 50%;

  box-shadow:
    0 0 6px rgba(255,220,120,0.6),
    0 0 12px rgba(180,200,255,0.25);

  filter: blur(0.8px);

  /* ⭐ 就是这行不见了！ */
  animation: fireflyFloat 12s linear infinite;
}

@keyframes fireflyFloat {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateY(-60px); opacity: 0.8; }
  100% { transform: translateY(-120px); opacity: 0; }
}
  .nav {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50%;
  cursor: pointer;
  z-index: 6;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

  .book-text.left {
  left: 18%;
  width: 26%;
}

.book-text.right {
  left: 56%;
  width: 26%;
}

</style>
</head>

<body>

<div class="fireflies"></div>

<div class="book-wrapper">
  <div class="nav left" onclick="prevPage()"></div>
<div class="nav right" onclick="nextPage()"></div>

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

  <div class="book-text left" id="leftPage"></div>
<div class="book-text right" id="rightPage"></div>
  <b class="title">
  <span class="zh">狐狸</span>
  <span class="en">（Fox）</span>
</b>

  <p>代表聪明、谨慎与策略。<br>
  有时也暗示算计与防备。</p>

  <p>当它出现时，提醒你保持警觉，<br>
  用智慧而非冲动行动。</p>
</div>

</div>
<script>
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";

  /* ⭐ 每一只萤火虫不同节奏 */
  f.style.animationDelay = Math.random() * 10 + "s";
  f.style.animationDuration = (8 + Math.random() * 6) + "s";

  fireflyContainer.appendChild(f);
}

  const pages = [
  {
    title: "狐狸（Fox）",
    text: "代表聪明、谨慎与策略。<br>有时也暗示算计与防备。<br><br>当它出现时，提醒你保持警觉，用智慧而非冲动行动。"
  },
  {
    title: "花束（Bouquet）",
    text: "象征礼物、喜悦与人际关系的温暖。<br><br>它代表被欣赏、被给予，也意味着好运与美好。"
  }
];

let currentPage = 0;

function renderPage() {
  const left = pages[currentPage * 2];
  const right = pages[currentPage * 2 + 1];

  document.getElementById("leftPage").innerHTML = left ? `
    <b class="title">${left.title}</b>
    <p>${left.text}</p>
  ` : "";

  document.getElementById("rightPage").innerHTML = right ? `
    <b class="title">${right.title}</b>
    <p>${right.text}</p>
  ` : "";
}

function nextPage() {
  if ((currentPage + 1) * 2 < pages.length) {
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
  }
}

renderPage();
  
</script>
</body>
</html>
