<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Test</title>

<style>

/* 🌿 背景 /
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/ 🌑 暗层 /
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.65);
  z-index: 0;
}

/ 📖 容器（关键！！） /
.book-wrapper {
  position: relative;
  width: min(92vw, 900px);   / ⭐ 限制大小 /
  margin-top: 60px;
  z-index: 2;
}

/ 📖 书 /
.book {
  width: 100%;
  display: none;
}

/ 默认显示双页 /
.book-double {
  display: block;
}

/ 📱 手机切单页 /
@media (max-width: 600px) {
  .book-double { display: none; }
  .book-single { display: block; }
}

/ 📝 文字（贴书关键！！） /
.book-text {
  position: absolute;
  top: 18%;
  left: 25%;        / ⭐ 左页位置 /
  width: 22%;

  color: #3a2e1f;
  font-family: serif;
  line-height: 1.6;
  font-size: clamp(12px, 1.5vw, 16px);
}

/ 📱 手机文字 */
@media (max-width: 600px) {
  .book-text {
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    top: 20%;
  }
}

</style>
</head>

<body>

<div class="book-wrapper">

  <!-- 双页 -->
  <img src="book-open-v1.png" class="book book-double">

  <!-- 单页 -->
  <img src="book-open-v2.png" class="book book-single">

  <!-- 内容 -->
  <div class="book-text">
    <b>狐狸（Fox）</b><br><br>
    代表聪明、谨慎与策略。<br>
    有时也暗示算计与防备。<br><br>
    当它出现时，提醒你保持警觉，<br>
    用智慧而非冲动行动。
  </div>

</div>

</body>
</
