
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/ *🌑 暗层（变淡！）*/
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); / ⭐ 原本太黑 /
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 20%;
  left: 18%;     /* ⭐ 往内收 */
  width: 26%;    /* ⭐ 稍微变宽 */

  color: #3a2e1f;
  font-family: serif;
  line-height: 1.6;
  font-size: clamp(12px, 1.4vw, 16px);
}

/*📱 手机（之后再开） */
@media (max-width: 600px) {
  .book-double { display: none; }
  .book-single { display: block; }

  .book-wrapper {
    width: 85vw;
  }

  .book-text {
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    top: 20%;
  }
}

</style>
</head>

<body>

<div class="book-wrapper">

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

  <div class="book-text">
    <b>狐狸（Fox）</b><br><br>
    代表聪明、谨慎与策略。<br>
    有时也暗示算计与防备。<br><br>
    当它出现时，提醒你保持警觉，<br>
    用智慧而非冲动行动。
  </div>

</div>

</body>
</html>
