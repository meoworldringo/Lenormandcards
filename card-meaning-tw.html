
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/ *🌑 暗层（变淡！）*/
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); / ⭐ 原本太黑 /
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 20%;
  left: 18%;     /* ⭐ 往内收 */
  width: 26%;    /* ⭐ 稍微变宽 */

  color: #3a2e1f;
  font-family: serif;
  line-height: 1.6;
  font-size: clamp(12px, 1.4vw, 16px);
}

/*📱 手机（之后再开） */
@media (max-width: 600px) {
  .book-double { display: none; }
  .book-single { display: block; }

  .book-wrapper {
    width: 85vw;
  }

  .book-text {
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    top: 20%;
  }
}
.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;
  background: radial-gradient(circle, rgba(255,220,120,0.9) 0%, rgba(255,220,120,0) 80%);
  filter: blur(1px);
  border-radius: 50%;
  animation: fireflyFloat 12s linear infinite;
  opacity: 0;
}

@keyframes fireflyFloat {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateY(-60px); opacity: 0.8; }
  100% { transform: translateY(-120px); opacity: 0; }
}
  

</style>
</head>

<body>

<div class="fireflies"></div>

<div class="book-wrapper">

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

  <div class="book-text">
    <b>狐狸（Fox）</b><br><br>
    代表聪明、谨慎与策略。<br>
    有时也暗示算计与防备。<br><br>
    当它出现时，提醒你保持警觉，<br>
    用智慧而非冲动行动。
  </div>

</div>
<script>
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";
  f.style.animationDelay = Math.random() * 10 + "s";

  fireflyContainer.appendChild(f);
}
</script>
</body>
</html>
