
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/* 🌑 暗层（变淡！） */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); /* ⭐ 原本太黑 */
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 16%;
  left: 18%;
  width: 30%;

  color: rgba(70, 50, 25, 0.75);  /* ⭐ 更淡 */

  font-family: "Times New Roman", serif;

  line-height: 1.6;               /* ⭐ 拉开（关键） */
  letter-spacing: 0.5px;            /* ⭐ 明显变化 */

 font-size:clamp(12.2px, 1.4vw, 17px);
  font-weight: 400;               /* ⭐ 变轻 */

  text-align: justify;            /* ⭐ 像书（关键） */
}

.book-text p {
  margin: 12px 0;
}
  
  .book-text p:last-child {
  text-align: left;
}

.title {
  flex: 1;
  display: inline-block;
  text-align: left;        /* ⭐ 不要再居中，会更自然 */

  font-size: 1.2em;       /* ⭐ 控标题大小（防换行） */
  line-height: 1.3;

  margin: 0;               /* ⭐ 统一归零 */
  margin-bottom: 6px;      /* ⭐ 控标题 ↔ 下方说明 */
  margin-top:35px;

  letter-spacing: 0.5px;
  color: rgba(50, 35, 20, 0.9);
  white-space: nowrap;
}

  .zh {
  font-family: inherit;
}

.en {
  font-family: inherit;
  font-style: normal;
  margin-left: 4px;
  opacity: 0.75;
}

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;

  background: radial-gradient(
    circle,
    rgba(255,220,120,0.9) 0%,
    rgba(255,220,120,0.4) 40%,
    rgba(255,220,120,0) 80%
  );

  border-radius: 50%;

  box-shadow:
    0 0 6px rgba(255,220,120,0.6),
    0 0 12px rgba(180,200,255,0.25);

  filter: blur(0.8px);

  /* ⭐ 就是这行不见了！ */
  animation: fireflyFloat 12s linear infinite;
}

@keyframes fireflyFloat {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateY(-60px); opacity: 0.8; }
  100% { transform: translateY(-120px); opacity: 0; }
}
  .nav {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50%;
  cursor: pointer;
  z-index: 6;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

  .book-text.left {
  left: 18%;
  width: 26%;
}

.book-text.right {
  left: 56%;
  width: 26%;
}

.card-img {
  display: block;
  width: 110px !important;
  margin: 0; 
  opacity: 0.7;

  mix-blend-mode: multiply;
  filter: contrast(0.9) brightness(0.95);

  border-radius: 4px;
}

/* ⭐ 这个必须独立出来 */
.title-row {
  display: flex;

  align-items: flex-start;

  gap: 15px;              /* 图 ↔ 标题 */

  margin-bottom: 25px;    /* ⭐ 上下区块距离（关键） */
}

.back-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;

  padding: 10px 18px;
  font-size: 14px;
  letter-spacing: 1px;

  z-index: 10;

  color: #f5e9cc;
  text-decoration: none;

  border: 1px solid rgba(255,230,150,0.35);
  border-radius: 999px;

  background: rgba(20,25,30,0.35);
  backdrop-filter: blur(6px);

  /* ⭐ 基础光 */
  box-shadow: 0 0 10px rgba(255,220,120,0.2);

  /* ⭐ 核心：呼吸光 */
  animation: btnBreath 3s ease-in-out infinite;

  transition: all 0.25s ease;
  
}

  @keyframes btnBreath {
  0% {
    box-shadow:
      0 0 8px rgba(255,220,120,0.2);
  }
  50% {
    box-shadow:
      0 0 20px rgba(255,220,120,0.7),
      0 0 40px rgba(255,200,80,0.35);
  }
  100% {
    box-shadow:
      0 0 8px rgba(255,220,120,0.2);
  }
}
  
  /* 📱 手机 + 平板纵向 → 按钮在正下方 */
 @media (max-width: 600px) {

  /* ⭐ 单页 */
  .book-double { display: none; }
  .book-single { display: block !important; }

  /* ⭐ 书位置（只微调，不乱动结构） */
  .book-wrapper {
    width: 92vw;
    margin-top: 80px;   /* ⭐ 从100 → 80（往上收一点） */
    position: relative;
    aspect-ratio: 3 / 4;
  }

  .book-wrapper img {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ⭐⭐ 核心：整块居中 + 上移 */
 .book-text.left {
  left: 33%;     /* ⭐ 往右推（关键） */
  width: 50%;    /* ⭐ 收窄（关键） */
  top: 32%;

  display: flex;
  flex-direction: column;
  gap: 12px;
}
   
  .book-text.right { display: none; }

  /* ⭐ 标题区（不要再漂） */
.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width：100%;

  padding-left: 40px;   /* ⭐ 核心：往右推整组 */
}
  .card-img {
    width: 90px !important;
    flex-shrink: 0;
    margin-top: -75px;
  }

  /* ⭐⭐ 标题稳定器（重点） */
  .title {
    flex: 1;
    text-align: left;

    margin: 0;
    line-height: 1.3;

    white-space: nowrap;

    /* ❗关键两行：防“看起来偏左” */
    display: block;
    margin-left: 70px;
    transform: translateY(-45px);
  }

  /* ⭐ 说明文 */
  .book-text p {
    margin-top: 20px;   /* ⭐ 稍微收紧 */
  }

  .book-text {
    font-size: 12px;
    line-height: 1.5;
  }

  /* ⭐ 按钮 */
  .back-btn {
    left: 50%;
    transform: translateX(-50%);
    bottom: 18px;

    width: fit-content;
    max-width: 160px;
    padding: 10px 16px;

    white-space: nowrap;
    text-align: center;
  }
}
  @media (min-width: 601px) and (max-width: 900px) and (orientation: portrait) {

  /* ⭐ 强制双页 */
  .book-double { display: block !important; }
  .book-single { display: none !important; }

  /* ⭐ 书尺寸恢复正常（关键） */
  .book-wrapper {
    width: min(92vw, 900px);   /* ❗改回双页原本尺寸 */
    margin-top: 150px;
    position: relative;
  }

  /* ⭐ 左页 */
  .book-text.left {
    left: 18%;
    width: 26%;
    top: 16%;   /* ❗恢复原本比例 */
  }

  /* ⭐ 右页 */
  .book-text.right {
    display: block !important;
    left: 56%;
    width: 26%;
    top: 16%;   /* ❗同步 */
  }

}
    
  @media (hover: hover) {
  .back-btn:hover {
    transform: translateY(-2px);

    /* ❗不改背景 → 就不会变黄 */
    background: rgba(20,25,30,0.55);

    /* ⭐ 只做发光 */
    box-shadow:
      0 6px 18px rgba(0,0,0,0.5),
      0 0 18px rgba(255,220,120,0.35),
      0 0 28px rgba(255,220,120,0.15);
  }
}

</style>
</head>

<body>

<div class="fireflies"></div>

<div class="book-wrapper">
  <div class="nav left" onclick="prevPage()"></div>
<div class="nav right" onclick="nextPage()"></div>

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

 <div class="book-text left page" id="leftPage"></div>
<div class="book-text right page" id="rightPage"></div>

</div>

<a href="bazaar.html" class="back-btn">← Back to Bazaar</a>
  
<script>
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";

  /* ⭐ 每一只萤火虫不同节奏 */
  f.style.animationDelay = -(Math.random() * 12) + "s";
  f.style.animationDuration = (8 + Math.random() * 6) + "s";

  fireflyContainer.appendChild(f);
}

  const pages = [
  { title: "1. Rider", img: "card1.jpg", text: "The rabbit knight sets off with companions and a little hitchhiking turtle!<br>No matter swamp or land — <br>Big Croc, charge ahead!<br><br>Keywords: message, action, arrival" },
  { title: "2. Clover", img: "card2.jpg", text: "A clover grows between the cracks of the street.<br>People rush past without noticing — <br>shh, a calico cat found it!<br><br>Keywords: luck, opportunity, chance" },
  { title: "3. Ship", img: "card3.jpg", text: "Once we traveled by ship, now we have planes, and maybe one day space shuttles!<br>And far into the future…<br>Hey, maybe someday we can open a door and go anywhere.<br><br>Keywords: travel, movement, distance" },
  { title: "4. House", img: "card4.jpg", text: "A house is alive.<br>With the breathing of its lights, <br>today… just stay home and rest.<br><br>Keywords: home, stability, foundation" },

  { title: "5.1 <br>Tree of the World", img: "card5-1.jpg", text: "You are taking root in the physical world.<br>Everything tangible in your life <br>is steadily growing.<br><br>Keywords: growth, connection, vitality" },
  { title: "5.2 <br>Tree of Spirit", img: "card5-2.jpg", text: "Your soul spreads its branches <br>in the lake of the subconscious.<br>Invisible changes are quietly unfolding.<br><br>Keywords: inner world, spirituality, subconscious" },

  { title: "6. Clouds", img: "card6.jpg", text: "Clouds block your sight, <br>but beyond the turbulence lies clear skies.<br><br>Keywords: confusion, uncertainty, obscurity" },
  { title: "7. Snake", img: "card7.jpg", text: "Follow the snake and its trailing poppies.<br>You may need to take a winding path to know where it leads.<br><br>Keywords: temptation, complexity, twists" },
  { title: "8. Coffin", img: "card8.jpg", text: "Death, <br>is only the beginning.<br><br>Keywords: ending, transformation, pause" },
  { title: "9. Bouquet", img: "card9.jpg", text: "Though a bouquet cannot last forever, in that moment I want to say:<br>The moon is beautiful tonight.<br><br>Keywords: gift, joy, kindness" },

  { title: "10. Scythe", img: "card10.jpg", text: "Before a rich harvest, <br>the scythe must cut away what no longer serves.<br><br>Keywords: decision, harvest, sudden change" },
  { title: "11. Whip", img: "card11.jpg", text: "Some things must be pulled again and again, until the truth finally reveals itself.<br><br>Keywords: conflict, repetition, tension" },
  { title: "12. Birds", img: "card12.jpg", text: "The little crows are here!<br>Maybe good news, maybe bad, <br>or just everyday chatter.<br>Oh… but they are quite noisy.<br><br>Keywords: messages, communication, fleeting" },

  { title: "13.1 <br>Introverted Child", img: "card13-1.jpg", text: "An introverted child is a child from the stars, quietly observing the world within a space of their own.<br><br>Keywords: new beginning, innocence, introversion" },
  { title: "13.2 <br>Extroverted Child", img: "card13-2.jpg", text: "An extroverted child lives <br>in a bright and colorful world,<br>curious and eager to explore everything.<br><br>Keywords: new beginning, energy, extroversion" },

  { title: "14. Fox", img: "card14.jpg", text: "The fox says: <br>Guess which key can open the door I guard?<br><br>Keywords: strategy, cunning, deception" },
  { title: "15. Bear", img: "card15.jpg", text: "Power gathers quietly in rest,<br>waiting for the perfect moment to strike.<br><br>Keywords: strength, authority, protection" },
  { title: "16. Stars", img: "card16.jpg", text: "Stars are the seeds of our inspiration.<br><br>Keywords: network, hope, inspiration" },
  { title: "17. Stork", img: "card17.jpg", text: "A transformation is taking place.<br><br>Keywords: change, transformation, movement" },
  { title: "18. Dog", img: "card18.jpg", text: "We’ll always be <br>the best companions. <br>Just Smile :)<br><br>Keywords: loyalty, friendship, trust" },

  { title: "19. Tower", img: "card19.jpg", text: "A bouquet is offered to the solid tower, hoping for the day its doors will open.<br><br>Keywords: isolation, system, distance" },
  { title: "20. Garden", img: "card20.jpg", text: "The dazzling party has begun! <br>Come and join the fun!<br><br>Keywords: social, community, public" },
  { title: "21. Mountain", img: "card21.jpg", text: "To burn Mount Sumeru with fireflies requires fearless courage.<br><br>Keywords: obstacle, difficulty, delay" },
  { title: "22. Crossroads", img: "card22.jpg", text: "Report! <br>One kilometer to the summit, <br>a snake fifteen meters ahead.<br>The road splits — <br>the heart knows the closest path.<br><br>Keywords: choice, crossroads, decision" },
  { title: "23. Mice", img: "card23.jpg", text: "Sweet anxiety and tiny losses<br>are squeaking in the dark corners.<br><br>Keywords: loss, anxiety, drain" },

  { title: "24.1 <br>The Ardent Heart", img: "card24-1.jpg", text: "A burning heart. <br>An unmatched passion and desire.<br><br>Keywords: love, passion, emotion" },
  { title: "24.2 <br>The Ethereal Heart", img: "card24-2.jpg", text: "A heart as transparent as the night sky, resonating only with those who understand.<br><br>Keywords: connection, resonance, soul" },
  { title: "24.3 <br>The Weathered Heart", img: "card24-3.jpg", text: "The heart is the poetry of everyday life —<br>bread, salt, tea, and flowers through time.<br><br>Keywords: relationship, daily life, companionship" },

  { title: "25. Ring", img: "card25.jpg", text: "May every promise carry <br>the peace of doves<br>and the devotion of rosemary.<br><br>Keywords: commitment, relationship, cycle" },
  { title: "26. Book", img: "card26.jpg", text: "Walking alone through the night, <br>among the pages.<br>Some thoughts remain unspoken.<br><br>Keywords: secret, knowledge, hidden" },
  { title: "27. Letter", img: "card27.jpg", text: "After many sleepless nights of coffee, the answer finally arrives.<br>Open it — <br>whatever it says, the teddy bear is with you.<br><br>Keywords: message, document, notice" },
  { title: "28. Man", img: "card28.jpg", text: "The boundary between day and night is called the twilight hour.<br>When you see this card… <br>who comes to mind?<br><br>Keywords: man, querent, subject" },
  { title: "29. Woman", img: "card29.jpg", text: "The boundary between day and night is called the twilight hour.<br>When you see this card… <br>who comes to mind?<br><br>Keywords: woman, querent, subject" },

  { title: "30. Lily", img: "card30.jpg", text: "A snow-white lily, <br>like Joan of Arc — <br>pure and resolute.<br><br>Keywords: maturity, peace, intimacy" },
  { title: "31. Sun", img: "card31.jpg", text: "The sun is born anew — <br>life is a cycle of joy and light.<br><br>Keywords: success, energy, happiness" },
  { title: "32. Moon", img: "card32.jpg", text: "The moon has fallen to the ground.<br>One side can be touched, the other is fading.<br>Which side of the moon reveals itself to you?<br><br>Keywords: emotions, intuition, fluctuation" },
  { title: "33. Key", img: "card33.jpg", text: "Little Red Riding Hood gets lost in the forest,<br>and a kind bear offers her a key to rest.<br><br>Keywords: opportunity, answer, opening" },
  { title: "34. Fish", img: "card34.jpg", text: "A school of fish bears three axes through the waves!<br>Did you drop a golden one, a silver one… <br>or an iron one?<br><br>Keywords: wealth, flow, resources" },
  { title: "35. Anchor", img: "card35.jpg", text: "You have reached the shore.<br>Something is becoming fixed, <br>bringing long-term stability.<br><br>Keywords: stability, endurance, security" },
  { title: "36. Cross", img: "card36.jpg", text: "Faith takes root in the beliefs of everyday life.<br><br>Keywords: fate, burden, belief" }
];
  
let currentPage = 0;

function renderPage() {

  const isSingle = window.innerWidth <= 600

  if (isSingle) {
    // ⭐ 单页模式（手机 / 平板纵屏）
    const page = pages[currentPage];

    document.getElementById("leftPage").innerHTML = page ? `
      <div class="title-row">
        <img src="${page.img}" class="card-img">
        <b class="title">${page.title}</b>
      </div>
      <p>${page.text}</p>
    ` : "";

    document.getElementById("rightPage").innerHTML = "";

  } else {
    // ⭐ 双页模式（桌面 / 横屏）
    const leftIndex = currentPage * 2;
    const rightIndex = currentPage * 2 + 1;

    const left = pages[leftIndex];
    const right = pages[rightIndex];

    document.getElementById("leftPage").innerHTML = left ? `
      <div class="title-row">
        <img src="${left.img}" class="card-img">
        <b class="title">${left.title}</b>
      </div>
      <p>${left.text}</p>
    ` : "";

    document.getElementById("rightPage").innerHTML = right ? `
      <div class="title-row">
        <img src="${right.img}" class="card-img">
        <b class="title">${right.title}</b>
      </div>
      <p>${right.text}</p>
    ` : "";
  }
}
  
function nextPage() {
  const isSingle = window.innerWidth <= 600

  if (isSingle) {
    if (currentPage + 1 >= pages.length) return;
    currentPage++;
  } else {
    if ((currentPage + 1) * 2 >= pages.length) return;
    currentPage++;
  }

  renderPage();
}

function prevPage() {
  if (currentPage === 0) return;
  currentPage--;
  renderPage();
}
  
renderPage();

  window.addEventListener("resize", renderPage);
  
</script>

</body>
</html>
