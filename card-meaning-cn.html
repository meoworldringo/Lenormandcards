
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC&display=swap" rel="stylesheet">
<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/* 🌑 暗层（变淡！） */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); /* ⭐ 原本太黑 */
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 16%;
  left: 18%;
  width: 30%;

  color: rgba(70, 50, 25, 0.75);  /* ⭐ 更淡 */

  font-family: "Noto Serif SC", serif;

  line-height: 1.6;               /* ⭐ 拉开（关键） */
  letter-spacing: 0.5px;            /* ⭐ 明显变化 */

 font-size:clamp(12.2px, 1.4vw, 17px);
  font-weight: 400;               /* ⭐ 变轻 */

  text-align: justify;            /* ⭐ 像书（关键） */
}

.book-text p {
  margin: 12px 0;
}

.title {
  flex: 1;
  display: inline-block;
  text-align: left;        /* ⭐ 不要再居中，会更自然 */

  font-size: 1.3em;       /* ⭐ 控标题大小（防换行） */
  line-height: 1.3;

  margin: 0;               /* ⭐ 统一归零 */
  margin-bottom: 6px;      /* ⭐ 控标题 ↔ 下方说明 */
  margin-top:35px;

  letter-spacing: 0.5px;
  color: rgba(50, 35, 20, 0.9);
  white-space: nowrap;
}

  .zh {
  font-family: inherit;
}

.en {
  font-family: inherit;
  font-style: normal;
  margin-left: 4px;
  opacity: 0.75;
}

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;

  background: radial-gradient(
    circle,
    rgba(255,220,120,0.9) 0%,
    rgba(255,220,120,0.4) 40%,
    rgba(255,220,120,0) 80%
  );

  border-radius: 50%;

  box-shadow:
    0 0 6px rgba(255,220,120,0.6),
    0 0 12px rgba(180,200,255,0.25);

  filter: blur(0.8px);

  /* ⭐ 就是这行不见了！ */
  animation: fireflyFloat 12s linear infinite;
}

@keyframes fireflyFloat {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateY(-60px); opacity: 0.8; }
  100% { transform: translateY(-120px); opacity: 0; }
}
  .nav {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50%;
  cursor: pointer;
  z-index: 6;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

  .book-text.left {
  left: 18%;
  width: 26%;
}

.book-text.right {
  left: 56%;
  width: 26%;
}

.card-img {
  display: block;
  width: 110px !important;
  margin: 0; 
  opacity: 0.7;

  mix-blend-mode: multiply;
  filter: contrast(0.9) brightness(0.95);

  border-radius: 4px;
}

/* ⭐ 这个必须独立出来 */
.title-row {
  display: flex;

  align-items: flex-start;

  gap: 15px;              /* 图 ↔ 标题 */

  margin-bottom: 25px;    /* ⭐ 上下区块距离（关键） */
}

.back-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;

  padding: 10px 18px;
  font-size: 14px;
  letter-spacing: 1px;

  z-index: 10;

  color: #f5e9cc;
  text-decoration: none;

  border: 1px solid rgba(255,230,150,0.35);
  border-radius: 999px;

  background: rgba(20,25,30,0.35);
  backdrop-filter: blur(6px);

  /* ⭐ 基础光 */
  box-shadow: 0 0 10px rgba(255,220,120,0.2);

  /* ⭐ 核心：呼吸光 */
  animation: btnBreath 3s ease-in-out infinite;

  transition: all 0.25s ease;
  
}

  @keyframes btnBreath {
  0% {
    box-shadow:
      0 0 8px rgba(255,220,120,0.2);
  }
  50% {
    box-shadow:
      0 0 20px rgba(255,220,120,0.7),
      0 0 40px rgba(255,200,80,0.35);
  }
  100% {
    box-shadow:
      0 0 8px rgba(255,220,120,0.2);
  }
}
  
  /* 📱 手机 + 平板纵向 → 按钮在正下方 */
 @media (max-width: 600px) {

  /* ⭐ 单页 */
  .book-double { display: none; }
  .book-single { display: block !important; }

  /* ⭐ 书位置（只微调，不乱动结构） */
  .book-wrapper {
    width: 92vw;
    margin-top: 80px;   /* ⭐ 从100 → 80（往上收一点） */
    position: relative;
    aspect-ratio: 3 / 4;
  }

  .book-wrapper img {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ⭐⭐ 核心：整块居中 + 上移 */
 .book-text.left {
  left: 33%;     /* ⭐ 往右推（关键） */
  width: 50%;    /* ⭐ 收窄（关键） */
  top: 32%;

  display: flex;
  flex-direction: column;
  gap: 12px;
}
   
  .book-text.right { display: none; }

  /* ⭐ 标题区（不要再漂） */
.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width：100%;

  padding-left: 40px;   /* ⭐ 核心：往右推整组 */
}
  .card-img {
    width: 90px !important;
    flex-shrink: 0;
    margin-top: -75px;
  }

  /* ⭐⭐ 标题稳定器（重点） */
  .title {
    flex: 1;
    text-align: left;

    margin: 0;
    line-height: 1.3;

    white-space: nowrap;

    /* ❗关键两行：防“看起来偏左” */
    display: block;
    margin-left: 70px;
    transform: translateY(-45px);
  }

  /* ⭐ 说明文 */
  .book-text p {
    margin-top: 20px;   /* ⭐ 稍微收紧 */
  }

  .book-text {
    font-size: 12px;
    line-height: 1.5;
  }

  /* ⭐ 按钮 */
  .back-btn {
    left: 50%;
    transform: translateX(-50%);
    bottom: 18px;

    width: fit-content;
    max-width: 160px;
    padding: 10px 16px;

    white-space: nowrap;
    text-align: center;
  }
}
  @media (min-width: 601px) and (max-width: 900px) and (orientation: portrait) {

  /* ⭐ 强制双页 */
  .book-double { display: block !important; }
  .book-single { display: none !important; }

  /* ⭐ 书尺寸恢复正常（关键） */
  .book-wrapper {
    width: min(92vw, 900px);   /* ❗改回双页原本尺寸 */
    margin-top: 150px;
    position: relative;
  }

  /* ⭐ 左页 */
  .book-text.left {
    left: 18%;
    width: 26%;
    top: 16%;   /* ❗恢复原本比例 */
  }

  /* ⭐ 右页 */
  .book-text.right {
    display: block !important;
    left: 56%;
    width: 26%;
    top: 16%;   /* ❗同步 */
  }

}
    
  @media (hover: hover) {
  .back-btn:hover {
    transform: translateY(-2px);

    /* ❗不改背景 → 就不会变黄 */
    background: rgba(20,25,30,0.55);

    /* ⭐ 只做发光 */
    box-shadow:
      0 6px 18px rgba(0,0,0,0.5),
      0 0 18px rgba(255,220,120,0.35),
      0 0 28px rgba(255,220,120,0.15);
  }
}

</style>
</head>

<body>

<div class="fireflies"></div>

<div class="book-wrapper">
  <div class="nav left" onclick="prevPage()"></div>
<div class="nav right" onclick="nextPage()"></div>

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

 <div class="book-text left page" id="leftPage"></div>
<div class="book-text right page" id="rightPage"></div>

</div>

<a href="https://meoworldringo.github.io/Lenormandcards/index-cn.html" class="back-btn">← 回到集市</a>
  
<script>

  function goBack() {
  if (history.length > 1) {
    history.back();
  } else {
    window.location.href = "https://meoworldringo.github.io/Lenormandcards/index-cn.html";
  }
}
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";

  /* ⭐ 每一只萤火虫不同节奏 */
  f.style.animationDelay = -(Math.random() * 12) + "s";
  f.style.animationDuration = (8 + Math.random() * 6) + "s";

  fireflyContainer.appendChild(f);
}

  const pages = [
  { title: "1. 骑士", img: "card1.jpg", text: "兔子骑士和同伴带上搭顺风车的小乌龟，准备出发！<br>不论沼泽还是陆地，鳄鱼大哥，冲鸭～～<br><br>关键词：消息、行动、来访" },
  { title: "2. 四叶草", img: "card2.jpg", text: "街道的石砖缝，长了一株四叶草。<br>人们不停驻的匆匆走过——<br>嘘，三花猫发现它了！<br><br>关键词：幸运、机会、偶然" },
  { title: "3. 船", img: "card3.jpg", text: "过去是船，现在添了飞机，未来可能还有宇宙飞梭！<br>再到更久远的未来————<br>嘿，说不定有天我们打开门就能到任何地方。<br>你说是不？<br><br>关键词：旅行、移动、远方" },
  { title: "4. 房屋", img: "card4.jpg", text: "房屋是有生命的。<br>伴着灯的呼吸，今天，在家里安心待着吧。<br><br>关键词：家庭、安定、根基" },

  { title: "5.1 世界之树", img: "card5-1.jpg", text: "你正扎根于现世之中。<br>生命里有形的一切，都在稳固地成长。<br><br>关键词：成长、连结、生命力" },
  { title: "5.2 精神之树", img: "card5-2.jpg", text: "你的灵魂于潜意识的湖泊舒展枝叶。<br>无形的改变，都在逐渐发生。<br><br>关键词：内在、灵性、潜意识" },

  { title: "6. 云", img: "card6.jpg", text: "云遮住了视线，穿过乱流，就是晴天。<br><br>关键词：混乱、不安、模糊" },
  { title: "7. 蛇", img: "card7.jpg", text: "跟着蛇尾的罂粟花蜿蜒前进。<br>要多绕一些路，才知道通往何方。<br><br>关键词：诱惑、复杂、曲折" },
  { title: "8. 棺材", img: "card8.jpg", text: "死亡，只是开始。<br><br>关键词：结束、转变、释放" },
  { title: "9. 花束", img: "card9.jpg", text: "虽然花束的美丽无法久留，但那一刻我想说：<br><br>今晚的月色真美。<br><br>关键词：礼物、喜悦、善意" },

  { title: "10. 镰刀", img: "card10.jpg", text: "丰足的收获前，需要镰刀的断舍离。<br><br>关键词：决断、收割、突然" },
  { title: "11. 鞭子", img: "card11.jpg", text: "有些事物要一而再再而三的拉扯，才能看清事实的真相。<br><br>关键词：冲突、重复、压力" },
  { title: "12. 鸟", img: "card12.jpg", text: "鸦鸦们来了！<br>也许是好消息，也许坏消息，又或许是些日常琐事。<br>噢，不过它们真真有点吵。<br><br>关键词：讯息、交流、短暂" },

  { title: "13.1 i人小孩", img: "card13-1.jpg", text: "i人小孩是星星来的孩子，<br>喜欢窝在自己的领地，安静观察着世界。<br><br>关键词：新开始、纯真、内向" },
  { title: "13.2 e人小孩", img: "card13-2.jpg", text: "e人小孩的世界是灿烂与缤纷的，他们充满好奇心，兴致勃勃的探索一切。<br><br>关键词：新开始、活力、外向" },

  { title: "14. 狐狸", img: "card14.jpg", text: "狐狸说：<br>猜猜，哪把钥匙才能打开我看守的门呢？<br><br>关键词：策略、狡黠、欺骗" },
  { title: "15. 熊", img: "card15.jpg", text: "在沉睡时蓄势待发，酝酿一击必中的力量。<br><br>关键词：力量、权威、保护" },
  { title: "16. 星星", img: "card16.jpg", text: "星星，是我们灵感的种子。<br><br>关键词：网络、希望、灵感" },
  { title: "17. 鹳鸟", img: "card17.jpg", text: "有些转化正在发生。<br><br>关键词：改变、转化、迁移" },
  { title: "18. 狗", img: "card18.jpg", text: "我们永远是最好的小伙伴。<br>笑一个:）<br><br>关键词：忠诚、朋友、信任" },

  { title: "19. 塔", img: "card19.jpg", text: "为坚固的堡垒献上一束花，<br>冀望能等到开门的那日。<br><br>关键词：孤立、制度、距离" },
  { title: "20. 花园", img: "card20.jpg", text: "绚烂的宴会开始啦！<br>大家一起玩耍吧！<br><br>关键词：社交、人群、公开" },
  { title: "21. 山", img: "card21.jpg", text: "以萤火烧须弥山，<br>需要义无反顾的勇气。<br><br>关键词：阻碍、困难、延迟" },
  { title: "22. 十字路口", img: "card22.jpg", text: "报告！上山还有一公里，前方十五公尺处有蛇。<br>路分开了，<br>心是无极限近的抉择。<br><br>关键词：选择、分岔、决定" },
  { title: "23. 老鼠", img: "card23.jpg", text: "香甜的焦虑与细小的损失，<br>正在阴暗的角落吱吱的叫。<br><br>关键词：损耗、焦虑、流失" },

  { title: "24.1 燃烧之心", img: "card24-1.jpg", text: "燃烧之心。<br>无可比拟的渴望与热情。<br><br>关键词：爱、热情、情感" },
  { title: "24.2 灵魂之心", img: "card24-2.jpg", text: "星空一样透明的心，<br>只与理解者共鸣。<br><br>关键词：连结、共鸣、心灵" },
  { title: "24.3 岁月之心", img: "card24-3.jpg", text: "心，是岁月静好的柴米油盐诗酒花。<br><br>关键词：关系、日常、陪伴" },

  { title: "25. 戒指", img: "card25.jpg", text: "愿每个承诺，<br>都带着鸽子的和平与迷迭香的坚贞。<br><br>关键词：承诺、关系、循环" },
  { title: "26. 书本", img: "card26.jpg", text: "在扉页里的夜晚踽踽独行，有些心事还说不出口。<br><br>关键词：秘密、知识、隐藏" },
  { title: "27. 信件", img: "card27.jpg", text: "续了许多夜的咖啡，终于得到确定的消息。<br>拆封吧——<br>不论结果如何，熊熊陪你。<br><br>关键词：讯息、文件、通知" },
  { title: "28. 男人", img: "card28.jpg", text: "白天与黑夜交界处，被称为逢魔时刻。<br>看到这张牌，你想到了谁？<br><br>关键词：男性、当事人、主体" },
  { title: "29. 女人", img: "card29.jpg", text: "白天与黑夜交界处，被称为逢魔时刻。<br>看到这张牌，你想到了谁？<br><br>关键词：女性、当事人、主题" },

  { title: "30. 百合花", img: "card30.jpg", text: "雪色的百合，就像果敢又洁净的圣女贞德。<br><br>关键词：成熟、平静、亲密" },
  { title: "31. 太阳", img: "card31.jpg", text: "太阳宝宝诞生了，<br>生命是快乐及光明的循环。<br><br>关键词：成功、能量、快乐" },
  { title: "32. 月亮", img: "card32.jpg", text: "月亮落地了。<br>一侧碰得着，一侧正在消散。<br>哪一面的月亮向你显现了？。<br><br>关键词：情绪、直觉、波动" },
  { title: "33. 钥匙", img: "card33.jpg", text: "小红帽在森林里迷路，<br>友善的棕熊递给她一把歇脚处的钥匙。<br><br>关键词：机会、答案、开启" },
  { title: "34. 鱼", img: "card34.jpg", text: "鱼儿大军载着三种斧头顺着浪潮游过来囉～～<br>你掉的是金斧头？银斧头？还是铁斧头呢？<br><br>关键词：财富、流动、资源" },
  { title: "35. 锚", img: "card35.jpg", text: "靠岸了。<br>有东西正在固定下来，带着现实与长期的安定。<br><br>关键词：稳定、持久、安全" },
  { title: "36. 十字架", img: "card36.jpg", text: "信仰，<br>在日常生活的信念中落实。<br><br>关键词：命运、负担、信念" }
];
  
let currentPage = 0;

function renderPage() {

  const isSingle = window.innerWidth <= 600

  if (isSingle) {
    // ⭐ 单页模式（手机 / 平板纵屏）
    const page = pages[currentPage];

    document.getElementById("leftPage").innerHTML = page ? `
      <div class="title-row">
        <img src="${page.img}" class="card-img">
        <b class="title">${page.title}</b>
      </div>
      <p>${page.text}</p>
    ` : "";

    document.getElementById("rightPage").innerHTML = "";

  } else {
    // ⭐ 双页模式（桌面 / 横屏）
    const leftIndex = currentPage * 2;
    const rightIndex = currentPage * 2 + 1;

    const left = pages[leftIndex];
    const right = pages[rightIndex];

    document.getElementById("leftPage").innerHTML = left ? `
      <div class="title-row">
        <img src="${left.img}" class="card-img">
        <b class="title">${left.title}</b>
      </div>
      <p>${left.text}</p>
    ` : "";

    document.getElementById("rightPage").innerHTML = right ? `
      <div class="title-row">
        <img src="${right.img}" class="card-img">
        <b class="title">${right.title}</b>
      </div>
      <p>${right.text}</p>
    ` : "";
  }
}
  
function nextPage() {
  const isSingle = window.innerWidth <= 600

  if (isSingle) {
    if (currentPage + 1 >= pages.length) return;
    currentPage++;
  } else {
    if ((currentPage + 1) * 2 >= pages.length) return;
    currentPage++;
  }

  renderPage();
}

function prevPage() {
  if (currentPage === 0) return;
  currentPage--;
  renderPage();
}
  
renderPage();

  window.addEventListener("resize", renderPage);
  
</script>

</body>
</html>
