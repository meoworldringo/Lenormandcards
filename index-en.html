<style>

  /* ✨✨✨ 萤火虫 ✨✨✨ */

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;
  background: radial-gradient(circle, rgba(255,220,120,0.9) 0%, rgba(255,220,120,0) 80%);
filter: blur(1px);
  border-radius: 50%;
  animation: float 12s linear infinite;
  opacity: 0;
}

/* 随机位置 + 时间差（关键） */
.fireflies span:nth-child(1) { left:10%; top:80%; animation-delay: 0s; }
.fireflies span:nth-child(2) { left:30%; top:60%; animation-delay: 2s; }
.fireflies span:nth-child(3) { left:50%; top:90%; animation-delay: 4s; }
.fireflies span:nth-child(4) { left:70%; top:70%; animation-delay: 1s; }
.fireflies span:nth-child(5) { left:85%; top:85%; animation-delay: 3s; }
.fireflies span:nth-child(6) { left:20%; top:40%; animation-delay: 5s; }
.fireflies span:nth-child(7) { left:60%; top:30%; animation-delay: 6s; }
.fireflies span:nth-child(8) { left:80%; top:50%; animation-delay: 7s; }
.fireflies span:nth-child(9)  { left:15%; top:75%; animation-delay: 2.5s; }
.fireflies span:nth-child(10) { left:40%; top:85%; animation-delay: 1.5s; }
.fireflies span:nth-child(11) { left:75%; top:20%; animation-delay: 3.5s; }
.fireflies span:nth-child(12) { left:55%; top:65%; animation-delay: 4.5s; }
.fireflies span:nth-child(13) { left:6%;  top:55%; animation-delay: 1.2s; }
.fireflies span:nth-child(14) { left:10%; top:35%; animation-delay: 2.8s; }
.fireflies span:nth-child(15) { left:18%; top:20%; animation-delay: 4.2s; }

#drawBtn:hover {
  transform: translateY(-2px);

  background: linear-gradient(
    to bottom,
    #e6c878 0%,
    #caa94a 50%,
    #a07c2a 100%
  );

  box-shadow:
    0 6px 18px rgba(0,0,0,0.5),
    0 0 16px rgba(255,210,120,0.4),
    inset 0 1px 3px rgba(255,255,255,0.3),
    inset 0 -3px 6px rgba(90,60,10,0.5);
}

#drawBtn:active {
  transform: scale(0.96);
}
  
  
@keyframes float {
  0% {
    transform: translateY(0) scale(0.8);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  50% {
    transform: translateY(-60px) scale(1);
    opacity: 0.8;
  }
  100% {
    transform: translateY(-120px) scale(0.6);
    opacity: 0;
  }
}
@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

@keyframes titleGlow {
  0% { text-shadow: 0 0 6px rgba(255,240,180,0.4); }
  50% { text-shadow: 0 0 12px rgba(255,240,180,0.7); }
  100% { text-shadow: 0 0 6px rgba(255,240,180,0.4); }
}

@keyframes goldFlash {
  0% {
    text-shadow: 0 0 2px rgba(255,220,120,0.2);
  }
  50% {
    text-shadow: 
      0 0 14px rgba(255,220,120,0.9),
      0 0 30px rgba(255,200,80,0.6);
  }
  100% {
    text-shadow: 
      0 0 6px rgba(255,220,120,0.6),
      0 0 14px rgba(255,200,80,0.4);
  }
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.65);
  pointer-events: none;
  z-index: -1;
}

img {
  -webkit-user-drag: none;
  user-select: none;
  -webkit-touch-callout: none;
}

  
.card-area {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 40px;
  margin-top: 10px;
}


/* 🌿 平板（仅纵向）→ 改结构：图片上 / 文字下 */
@media (max-width: 900px) and (orientation: portrait) {

  .card-area {
    display: flex;
    flex-direction: column !important;
    align-items: center;
    gap: 28px; /* 图片和文字距离 */
  }

  #card-container {
    margin-left: 0;
  }

}


/* 📱 手机（细节优化，不动结构逻辑） */
@media (max-width: 768px) {

  .main {
    margin-top: 0;

    display: flex;
    flex-direction: column;
    align-items: center;

    padding: 0;
  }

  /* ⭐ 卡牌区域（改关键点） */
  .card-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;   /* ❗不要再用 center */

    padding-top: 40px;             /* ⭐ 用 padding 控位置（稳定） */
    padding-bottom: 20px;

    gap: 16px;
  }

  #card-container {
    transform: scale(1.05);        /* ⭐ 稍微缩一点，避免挤爆 */
  }

  #title {
    margin-top: 6px;
  }

  /* ⭐ 说明文 */
#text {
  width: 100%;
  max-width: 420px;
  padding: 16px 18px 10px;
  margin: 0 auto;
  box-sizing: border-box;
}

#meaning {
  font-size: 13.5px;
  line-height: 1.7;
  letter-spacing: 0.2px;

  white-space: normal;        /* ⭐ 关键改这里 */
  word-break: keep-all;       /* 英文不乱断 */
  overflow-wrap: break-word;  /* 太长才断 */

  text-align: center;
  padding: 0 14px;
}
  
  /* ⭐ 按钮靠近说明文 */
  #text + div {
    margin-top: 12px !important;   /* ⭐ 把按钮拉上来 */
  }

  /* ⭐ 标题区 */
  #header {
    margin-bottom: 6px;
    padding: 6px 12px;

    width: 92%;
    max-width: 420px;
    box-sizing: border-box;
  }

  /* ⭐ 副标题（关键修复） */
#subtitle {
  font-size: 10px;
  letter-spacing: 0.2px;

  white-space: nowrap;
}
  }
</style>
