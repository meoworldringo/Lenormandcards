<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Bazaar - Crystal</title>

<style>
body {
  margin: 0;
  background:
    radial-gradient(circle at 50% 55%, rgba(255,255,240,0.12), transparent 65%),
    url("forest.jpg"),
    #05070a;

  background-size: cover;
  background-position: center;

  display: flex;
  flex-direction: column;  

  justify-content: flex-start;
  align-items: center;

  min-height: 100vh;
  overflow: hidden;
  color: #f5e9d6;
  font-family: serif;
  padding-top: 22vh;
}

/* 🌙 呼吸光 */
body::before {

  content: "";
 position: fixed;
  inset: 0;
  z-index: 1;
  background:

    radial-gradient(circle at 30% 30%, rgba(255,245,200,0.25), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(255,245,200,0.15), transparent 30%),
    rgba(5,10,15,0.0);  /* ⭐ 一开始是透明 */
   
  animation: bgFadeIn 2s ease forwards;
}

@keyframes bgPulse {
  0%,100% { opacity: 0.3; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* 🃏 闪现牌 */
.flash-card {
  position: fixed;
  width: 120px;
  height: 180px;
  background-size: cover;
  opacity: 0;
  z-index: 2;
  pointer-events: none;
}

.card1 {
  left: 20%;
  top: 30%;
  background-image: url("card17.jpg");
  animation: flash 1.2s ease;
}

.card2 {
  right: 20%;
  top: 25%;
  background-image: url("card22.jpg");
  animation: flash 1.2s ease 1.1s;
}

.card3 {
  left: 40%;
  bottom: 20%;
  background-image: url("card31.jpg");
  animation: flash 1.2s ease 2.2s;
}

@keyframes flash {
  0%   { opacity: 0; transform: scale(0.9); }
  30%  { opacity: 0.5; }
  70%  { opacity: 0.4; }
  100% { opacity: 0; transform: scale(1.05); }
}

/*🔮 水晶球 */
.crystal {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  z-index: 3;
  margin-top: -60px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent 35%),
    radial-gradient(circle at 70% 70%, rgba(120,180,255,0.25), transparent 65%),
    rgba(200,230,255,0.08);   /* ← 提亮一点 */

   --glow-color: rgba(180,220,255,0.45);  /* ⭐ 默认光 */

box-shadow:
  0 0 80px var(--glow-color),
  inset 0 0 40px rgba(255,255,255,0.35);  /* ⭐ 这里要加分号 */

  opacity: 0;
  outline: 2px solid rgba(200,230,255,0.25);
  transform: scale(0.8);
  transition: 0.4s;
  filter: brightness(1.1) contrast(1.05);
  
  animation:
    crystalGlowStart 1.2s ease forwards 3.4s,   /* ⭐ 先发光 */
    crystalAppear 1.8s ease forwards 4s,      /* ⭐ 再成形 */
    crystalGlow 5s ease-in-out infinite 5.2s;     /* ⭐ 持续呼吸 */
}

.crystal::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;

  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5), transparent 35%),
    radial-gradient(circle at 70% 75%, rgba(180,220,255,0.2), transparent 60%);

  pointer-events: none;
  z-index: 2;
}

  .crystal::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;

  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.25),
    inset 0 0 60px rgba(180,220,255,0.15);

  pointer-events: none;
  z-index: 2;
}

@keyframes crystalAppear {
  to { opacity: 1; transform: scale(1); }
}

@keyframes crystalGlow {
  0%,100% {
    box-shadow:
      0 0 30px rgba(180,220,255,0.3),
      inset 0 0 20px rgba(255,255,255,0.2);
  }
  50% {
    box-shadow:
      0 0 70px rgba(180,220,255,0.6),
      inset 0 0 40px rgba(255,255,255,0.3);
  }
  }

  /* ⭐ 新增动画 */

@keyframes bgFadeIn {
  from { background-color: rgba(5,10,15,0); }
  to   { background-color: rgba(5,10,15,0.55); }
}

  @keyframes crystalGlowStart {
  0% {
    opacity: 0;
    transform: scale(0.6);
    box-shadow: 0 0 0 rgba(180,220,255,0);
  }
  100% {
    opacity: 0.6;
    transform: scale(0.9);
    box-shadow: 0 0 120px rgba(180,220,255,0.8);
  }
}


/* 粒子 */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  animation: float 6s linear infinite;
  opacity: 0;
  z-index: 5;
}

@keyframes float {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  20% { opacity: 1; }
  to {
    transform: translateY(-40px);
    opacity: 0;
  }
}

/* 👧 girl */
.girl {
  width: 110%;
  position: absolute;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  opacity: 0;
  filter: blur(20px);
  animation: girlAppear 4s ease forwards 5.2s;
  z-index: 1;
}

@keyframes girlAppear {
  0% {
    opacity: 0;
    filter: blur(20px);
    transform: translate(-50%, -40%) scale(0.95);
  }
  100% {
    opacity: 1;
    filter: blur(0);
    transform: translate(-50%, -50%) scale(1);
  }
}
  
/* 🌐 语言 */
.lang-select {
  position: static;
  margin-top: 60px;

  text-align: center;   /* ⭐ 关键：真正置中 */

  opacity: 0;
  animation: showMenu 2s ease forwards 7s;
}

/* 🌐 每一行 */
.lang-select a {
  display: inline-block; 
  text-align: center;

  margin: 14px 0;
  padding: 6px 12px;

  font-size: 16px;
  letter-spacing: 0.05em;

  color: rgba(255,255,255,0.9);
  text-decoration: none;

  /* ✨ 发光 */
  text-shadow:
    0 0 6px rgba(255,240,180,0.6),
    0 0 14px rgba(255,220,140,0.4),
    0 0 24px rgba(255,200,120,0.25);

  transition: 0.3s;

  /* 🌙 呼吸光（可留可删） */
  animation: textGlow 3.5s ease-in-out infinite;
}

/* ✨ hover 提亮 */
.lang-select a:hover {
  color: #ffe9a8;

  text-shadow:
    0 0 10px rgba(255,240,180,0.9),
    0 0 22px rgba(255,220,140,0.7),
    0 0 40px rgba(255,200,120,0.5);

  transform: translateY(-2px);
}

/* 🌙 呼吸光动画 */
@keyframes textGlow {
  0%,100% {
    text-shadow:
      0 0 4px rgba(255,240,180,0.4),
      0 0 10px rgba(255,220,140,0.3);
  }
  50% {
    text-shadow:
      0 0 10px rgba(255,240,180,0.9),
      0 0 22px rgba(255,220,140,0.7);
  }
}

@keyframes showMenu {
  to { opacity: 1; transform: translateY(-10px); }
}

</style>
</head>

<body>

<!-- 🃏 三张牌 -->
<div class="flash-card card1"></div>
<div class="flash-card card2"></div>
<div class="flash-card card3"></div>

<!-- 🔮 水晶球 -->
<div class="crystal">

  <img src="girl.png" class="girl">

  <!-- 粒子（放在后面！） -->
  <div class="sparkle" style="left:10%; animation-delay:0s;"></div>
  <div class="sparkle" style="left:25%; animation-delay:1s;"></div>
  <div class="sparkle" style="left:40%; animation-delay:2s;"></div>
  <div class="sparkle" style="left:55%; animation-delay:3s;"></div>
  <div class="sparkle" style="left:70%; animation-delay:4s;"></div>
  <div class="sparkle" style="left:85%; animation-delay:2.5s;"></div>
  <div class="sparkle" style="left:30%; animation-delay:1.5s;"></div>
  <div class="sparkle" style="left:60%; animation-delay:3.5s;"></div>

</div>
  
<!-- 🌐 语言 -->
<div class="lang-select">
  <a href="index-tw.html">繁體中文</a>
  <a href="index-cn.html">简体中文</a>
  <a href="index-jp.html">日本語</a>
  <a href="index-en.html">English</a>
</div>

<script>
const links = document.querySelectorAll(".lang-select a");
const crystal = document.querySelector(".crystal");

const colors = [
  "rgba(220,220,235,0.75)", // 繁中（银）
  "rgba(255,220,140,0.75)", // 简中（金）
  "rgba(210,190,255,0.75)", // 日文（浅紫）
  "rgba(180,220,255,0.75)"  // 英文（浅蓝）
];

const defaultColor = "rgba(180,220,255,0.45)";

links.forEach((link, i) => {
  link.addEventListener("mouseenter", () => {
    crystal.style.setProperty("--glow-color", colors[i]);
    crystal.style.transform = "scale(1.05)";
  });

  link.addEventListener("mouseleave", () => {
    crystal.style.setProperty("--glow-color", defaultColor);
    crystal.style.transform = "scale(1)";
  });
});
</script>
  
</body>
</html>
