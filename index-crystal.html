<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Bazaar - Crystal</title>

<style>
body {
  margin: 0;
  background:
    radial-gradient(circle at 50% 55%, rgba(255,255,240,0.12), transparent 65%),
    url("forest.jpg"),
    #05070a;

  background-size: cover;
  background-position: center;

  display: flex;
  flex-direction: column;  

  justify-content: flex-start;
  align-items: center;

  min-height: 100vh;
  overflow: hidden;
  color: #f5e9d6;
  font-family: serif;
  padding-top: 22vh;
}

/* 🌙 呼吸光 */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 1;

  background:
    radial-gradient(circle at 30% 30%, rgba(255,245,200,0.35), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(255,245,200,0.2), transparent 30%);

  animation: bgPulse 6s ease-in-out infinite;
}

@keyframes bgPulse {
  0%,100% { opacity: 0.3; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* 🃏 闪现牌 */
.flash-card {
  position: fixed;
  width: 120px;
  height: 180px;
  background-size: cover;
  opacity: 0;
  z-index: 2;
  pointer-events: none;
}

.card1 {
  left: 20%;
  top: 30%;
  background-image: url("card14.jpg");
  animation: flash 1.2s ease;
}

.card2 {
  right: 20%;
  top: 25%;
  background-image: url("card22.jpg");
  animation: flash 1.2s ease 1.1s;
}

.card3 {
  left: 40%;
  bottom: 20%;
  background-image: url("card30.jpg");
  animation: flash 1.2s ease 2.2s;
}

@keyframes flash {
  0%   { opacity: 0; transform: scale(0.9); }
  30%  { opacity: 0.5; }
  70%  { opacity: 0.4; }
  100% { opacity: 0; transform: scale(1.05); }
}

/*🔮 水晶球 */
.crystal {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  z-index: 3;
  margin-top: -60px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent 35%),
    radial-gradient(circle at 70% 70%, rgba(120,180,255,0.25), transparent 65%),
    rgba(200,230,255,0.08);   /* ← 提亮一点 */

  box-shadow:
    0 0 80px rgba(180,220,255,0.45),   /* ← 更外发光 */
    inset 0 0 40px rgba(255,255,255,0.35);

  opacity: 0;
  outline: 2px solid rgba(200,230,255,0.25);
  transform: scale(0.8);
  animation: crystalAppear 3s ease forwards 3.4s,
             crystalGlow 5s ease-in-out infinite 3.4s;
}

.crystal::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;

  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5), transparent 35%),
    radial-gradient(circle at 70% 75%, rgba(180,220,255,0.2), transparent 60%);

  pointer-events: none;
  z-index: 2;
}

  .crystal::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;

  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.25),
    inset 0 0 60px rgba(180,220,255,0.15);

  pointer-events: none;
  z-index: 2;
}

@keyframes crystalAppear {
  to { opacity: 1; transform: scale(1); }
}

@keyframes crystalGlow {
  0%,100% {
    box-shadow:
      0 0 30px rgba(180,220,255,0.3),
      inset 0 0 20px rgba(255,255,255,0.2);
  }
  50% {
    box-shadow:
      0 0 70px rgba(180,220,255,0.6),
      inset 0 0 40px rgba(255,255,255,0.3);
  }
}

/* 粒子 */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(255,255,255,0.8);
  border-radius: 50%;
  animation: float 6s linear infinite;
  opacity: 0;
  z-index: 3;
}

@keyframes float {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  20% { opacity: 1; }
  to {
    transform: translateY(-40px);
    opacity: 0;
  }
}

/* 👧 girl */
.girl {
  width: 110%;
  position: absolute;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  opacity: 0;
  filter: none;
  animation: girlAppear 3s ease forwards 4.5s;
  z-index: 1;
}

@keyframes girlAppear {
  to {
    opacity: 1;
    filter: blur(0);
    transform: translate(-50%, -50%);
  }
}

/* 🌐 语言 */
.lang-select {
  position: static;   /* ← 必改 */
  margin-top: 50px;   /* ← 拉开距离 */
  opacity: 0;
  z-index: 4;
  animation: showMenu 2s ease forwards 5.5s;
}

.lang-select a {
  display: block;
  margin: 40px;
  color: rgba(255,255,255,0.85);
  text-decoration: none;
}

.lang-select a:hover {
  color: #ffe9a8;
}

@keyframes showMenu {
  to { opacity: 1; transform: translateY(-10px); }
}

</style>
</head>

<body>

<!-- 🃏 三张牌 -->
<div class="flash-card card1"></div>
<div class="flash-card card2"></div>
<div class="flash-card card3"></div>

<!-- 🔮 水晶球 -->
<div class="crystal">

 <!-- 粒子 -->
<div class="sparkle" style="left:25%; animation-delay:0s; animation-duration:6s;"></div>
<div class="sparkle" style="left:60%; animation-delay:2s; animation-duration:8s;"></div>
<div class="sparkle" style="left:45%; animation-delay:4s; animation-duration:7s;"></div>

  <img src="girl.png" class="girl">

</div>
<!-- 🌐 语言 -->
<div class="lang-select">
  <a href="index-tw.html">繁體中文</a>
  <a href="index-cn.html">简体中文</a>
  <a href="index-jp.html">日本語</a>
  <a href="index-en.html">English</a>
</div>

</body>
</html>
