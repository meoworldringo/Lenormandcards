<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Bazaar - Crystal</title>

<style>
body {
  margin: 0;
  background:
    radial-gradient(circle at 50% 55%, rgba(255,255,240,0.12), transparent 65%),
    url("forest.jpg"),
    #05070a;

  background-size: cover;
  background-position: center;

  display: flex;
  flex-direction: column;  

  justify-content: flex-start;
  align-items: center;

  min-height: 100vh;
  overflow: hidden;
  color: #f5e9d6;
  font-family: serif;
  padding-top: 22vh;
}

/* 🌙 呼吸光 */
body::before {

  content: "";
 position: fixed;
  inset: 0;
  z-index: 1;
  background:

    radial-gradient(circle at 30% 30%, rgba(255,245,200,0.25), transparent 45%),
    radial-gradient(circle at 80% 80%, rgba(255,245,200,0.15), transparent 30%),
    rgba(5,10,15,0.55);  /* ⭐ 一开始是透明 */
   
  animation: bgFadeIn 2s ease forwards;
}

@keyframes bgPulse {
  0%,100% { opacity: 0.3; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1.1); }
}

/*🔮 水晶球 */
.crystal {
  width: 260px;
  height: 260px;
  border-radius: 50%;
  position: relative;
  overflow: hidden;
  z-index: 3;
  margin-top: -60px;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), transparent 35%),
    radial-gradient(circle at 70% 70%, rgba(120,180,255,0.25), transparent 65%),
    rgba(200,230,255,0.08);   /* ← 提亮一点 */

   --glow-color: rgba(180,220,255,0.45);  /* ⭐ 默认光 */

box-shadow:
  0 0 80px var(--glow-color),
  inset 0 0 40px rgba(255,255,255,0.35);  /* ⭐ 这里要加分号 */

  opacity: 0;
  outline: 2px solid rgba(200,230,255,0.25);
  transform: scale(0.8) translateY(20px);
  transition: 0.4s;
  filter: brightness(1.1) contrast(1.05);
  
  animation:
  crystalGlowStart 1.2s ease,
  crystalAppear 1.8s ease forwards 1s,
  crystalGlow 5s ease-in-out infinite 2.8s,
  crystalFloat 6s ease-in-out infinite 2.8s;
}

.crystal::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;

  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5), transparent 35%),
    radial-gradient(circle at 70% 75%, rgba(180,220,255,0.2), transparent 60%);

  pointer-events: none;
  z-index: 2;
}

  .crystal::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;

  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.25),
    inset 0 0 60px rgba(180,220,255,0.15);

  pointer-events: none;
  z-index: 2;
}

@keyframes crystalAppear {
  to { 
    opacity: 1; 
    transform: scale(1) translateY(0);
  }
}

@keyframes crystalGlow {
  0%,100% {
    box-shadow:
      0 0 30px var(--glow-color),
      inset 0 0 20px rgba(255,255,255,0.2);
  }
  50% {
    box-shadow:
      0 0 70px var(--glow-color),
      inset 0 0 40px rgba(255,255,255,0.3);
  }
}

.crystal.active {
  transform: scale(1.2);

  box-shadow:
    0 0 120px var(--glow-color),
    0 0 260px var(--glow-color),
    0 0 420px var(--glow-color),
    0 0 620px var(--glow-color);

  animation: crystalBurst 1.6s ease forwards; /* ⭐ 加这一行 */
}

 .crystal.active .sparkle {
  animation: none;              /* ⭐ 先关掉原本动画 */
  animation: suckIn 1.6s ease forwards;

   @keyframes crystalFloat {
  0%,100% { transform: scale(1) translateY(0); }
  50%     { transform: scale(1) translateY(-6px); }
}
  
}
  @keyframes suckIn {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(1);
  }

  70% {
    opacity: 1;
    transform: translate(
      calc(130px - 100% * var(--x)),
      calc(130px - 100% * var(--y))
    ) scale(0.3);
  }

  100% {
  opacity: 0;
  transform: translate(
    calc(130px - 100% * var(--x)),
    calc(130px - 100% * var(--y))
  ) scale(0.1) rotate(180deg);
  }
}

  @keyframes crystalBurst {
  0% {
    transform: scale(1);
    box-shadow:
      0 0 40px var(--glow-color),
      0 0 80px var(--glow-color);
  }

  40% {
    transform: scale(1.25);
    box-shadow:
      0 0 120px var(--glow-color),
      0 0 260px var(--glow-color),
      0 0 400px var(--glow-color);
  }

  70% {
    transform: scale(1.35);
    box-shadow:
      0 0 180px var(--glow-color),
      0 0 360px var(--glow-color),
      0 0 600px var(--glow-color);
  }

  100% {
    transform: scale(1.45);
    box-shadow:
      0 0 140px var(--glow-color),
      0 0 280px var(--glow-color);
  }
}

/* 粒子 */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);

 top: calc(15% + 70% * var(--y));
left: calc(15% + 70% * var(--x));

  animation: float 6s linear infinite;
  opacity: 0;
  z-index: 4;
}

@keyframes float {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  20% { opacity: 1; }
  to {
    transform: translateY(-40px);
    opacity: 0;
  }
}

/* 👧 girl */
.girl {
  width: 110%;
  position: absolute;
  left: 50%;
  top: 55%;
  transform: translate(-50%, -50%);
  opacity: 0;
  filter: blur(20px);
  animation: girlAppear 3.5s ease forwards 3s,
  girlFloat 6s ease-in-out infinite 6.5s;
  z-index: 2;
}

@keyframes girlAppear {
  0% {
    opacity: 0;
    filter: blur(20px);
    transform: translate(-50%, -40%) scale(0.95);
  }
  100% {
    opacity: 1;
    filter: blur(0);
    transform: translate(-50%, -50%) scale(1);
  }
}

  @keyframes girlFloat {
  0%,100% {
    transform: translate(-50%, -50%);
  }
  50% {
    transform: translate(-50%, -52%);
  }
}
  
/* 🌐 语言 */
.lang-select {
  position: relative;   /* ⭐ 加这个 */
  z-index: 10;          /* ⭐ 加这个 */
  margin-top: 60px;
  text-align: center;   /* ⭐ 关键：真正置中 */

  opacity: 0;
  animation: showMenu 2s ease forwards 7s;
}

/* 🌐 每一行 */
.lang-select a {
  display: block; 
  text-align: center;

  margin: 14px 0;
  padding: 6px 12px;

  font-size: 16px;
  letter-spacing: 0.05em;

  color: rgba(255,255,255,0.9);
  text-decoration: none;

  /* ✨ 发光 */
  text-shadow:
    0 0 6px rgba(255,240,180,0.6),
    0 0 14px rgba(255,220,140,0.4),
    0 0 24px rgba(255,200,120,0.25);

  transition: 0.3s;

  /* 🌙 呼吸光（可留可删） */
  animation: textGlow 3.5s ease-in-out infinite;
}

/* ✨ hover 提亮 */
.lang-select a:hover {
  color: #ffe9a8;

  text-shadow:
    0 0 10px rgba(255,240,180,0.9),
    0 0 22px rgba(255,220,140,0.7),
    0 0 40px rgba(255,200,120,0.5);

  transform: translateY(-2px);
}

/* 🌙 呼吸光动画 */
@keyframes textGlow {
  0%,100% {
    text-shadow:
      0 0 4px rgba(255,240,180,0.4),
      0 0 10px rgba(255,220,140,0.3);
  }
  50% {
    text-shadow:
      0 0 10px rgba(255,240,180,0.9),
      0 0 22px rgba(255,220,140,0.7);
  }
}

@keyframes showMenu {
  to { opacity: 1; transform: translateY(-10px); }
}

</style>
</head>

<body>

<!-- 🔮 水晶球 -->
<div class="crystal">

  <img src="girl.png" class="girl">

  <!-- 粒子（放在后面！） -->
<div class="sparkle" style="--x:0.1; --y:0.2; animation-delay:0s;"></div>
<div class="sparkle" style="--x:0.8; --y:0.3; animation-delay:1s;"></div>
<div class="sparkle" style="--x:0.3; --y:0.7; animation-delay:2s;"></div>
<div class="sparkle" style="--x:0.6; --y:0.5; animation-delay:3s;"></div>
<div class="sparkle" style="--x:0.2; --y:0.4; animation-delay:4s;"></div>
<div class="sparkle" style="--x:0.9; --y:0.6; animation-delay:2.5s;"></div>
<div class="sparkle" style="--x:0.4; --y:0.1; animation-delay:1.5s;"></div>
<div class="sparkle" style="--x:0.7; --y:0.8; animation-delay:3.5s;"></div>

</div>
  
<!-- 🌐 语言 -->
<div class="lang-select">
  <a href="index-tw.html">繁體中文</a>
  <a href="index-cn.html">简体中文</a>
  <a href="index-jp.html">日本語</a>
  <a href="index-en.html">English</a>
</div>

<script>
const links = document.querySelectorAll(".lang-select a");
const crystal = document.querySelector(".crystal");

const colors = [
  "rgba(255,170,210,0.95)", // 繁中
  "rgba(255,220,140,0.75)", // 简中
  "rgba(210,190,255,0.75)", // 日文
  "rgba(180,220,255,0.75)"  // 英文
];

links.forEach((link, i) => {
  link.addEventListener("click", (e) => {
    e.preventDefault();

    crystal.style.setProperty("--glow-color", colors[i]);
    crystal.classList.add("active");

    setTimeout(() => {
      window.location.href = link.href;
    }, 2200);
  });
});

  document.querySelectorAll(".sparkle").forEach(s => {
  s.style.animationDuration = "1.6s";
});
  
</script>
  
</body>
</html>
