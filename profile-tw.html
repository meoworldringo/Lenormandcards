<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Orbs</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0B0F14;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 容器 */
.stage {
  position: relative;
  width: 500px;
  height: 420px;
}
  
  #profileText {
  position: absolute;
  top: 220px;
  left: 50%;
  opacity: 0;
  transition: opacity 0.4s ease;
  transform: translateX(-50%);
  color: #ffe9b0;
  font-size: 18px;
  text-align: center;
  pointer-events: none;
}

/* 球 */
.orb {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;

  box-shadow: 0 0 30px rgba(255, 220, 140, 0.6);

  animation: float 4s ease-in-out infinite;
  transition: all 0.5s ease;
}

  .orb:nth-child(1) {
  left: 0;
  top: 180px;
}

.orb:nth-child(2) {
  left: 150px;
  top: 0;
}

.orb:nth-child(3) {
  left: 300px;
  top: 180px;
}
  
/* 主角位置（中央） */
.orb.active {
  left: 150px !important;
  top: 120px !important;
  transform: scale(1.3);
  z-index: 2;
  box-shadow: 0 0 50px rgba(255, 240, 180, 1);
}

/* 其他缩小 */
.orb.inactive {
  transform: scale(0.75);
  opacity: 0.6;
}
  

/* 漂浮动画 */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
  100% { transform: translateY(0px); }
}

</style>
</head>

<body>

<div class="stage">
<img src="profile-c.png" class="orb inactive">
<img src="profile-me.png" class="orb active">
<img src="profile-g.png" class="orb inactive">
  
  <div id="profileText"></div> 
</div>

  <script>
const orbs = document.querySelectorAll('.orb');
const text = document.getElementById('profileText');

const profiles = [
  "c哥：每天被拖著熬夜寫指令的忠臣",
  "小抱：頭髮岌岌可危的點子提供者",
  "小g：最會給情緒價值+吐槽c哥的弄臣"
];

orbs.forEach((orb, index) => {
  orb.onclick = () => {

    orbs.forEach(o => {
      o.classList.remove('active');
      o.classList.add('inactive');
    });

    orb.classList.add('active');
    orb.classList.remove('inactive');

    text.innerText = profiles[index];
  };
});
</script>
  
</body>
</html>
