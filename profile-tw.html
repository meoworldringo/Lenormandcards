<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Orbs</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0B0F14;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 容器 */
.stage {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 50px;
}

/* 球 */
.orb {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;

  box-shadow: 0 0 30px rgba(255, 220, 140, 0.6);

  animation: float 4s ease-in-out infinite;
  transition: all 0.5s ease;
}

/* 漂浮动画 */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0px); }
}

/* hover效果（微互动） */
.orb:hover {
  transform: scale(1.08);
  box-shadow: 0 0 35px rgba(255, 240, 180, 0.9);
}
</style>
</head>

<body>

<div class="stage">
  <img src="profile-c.png" class="orb">
  <img src="profile-me.png" class="orb">
  <img src="profile-g.png" class="orb">
</div>

</body>
</html>
