
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile Orbs</title>

<style>
body {
  margin: 0;
  height: 100vh;

  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 容器 */
.stage {
  margin-top: 20px;
  position: relative;
  width: 500px;
  height: 420px;
}

/* 文字 */
#profileText {
  position: absolute;
  top: 260px;
  left: 50%;
  transform: translateX(-50%);
  color: #ffe9b0;
  font-size: 16.5px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  white-space: nowrap;
}

/* 球 */
.orb {
  position: absolute;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;

  box-shadow: 0 0 30px rgba(255, 220, 140, 0.6);
  animation: orbFloat 4s ease-in-out infinite;
  transition: all 0.6s ease;
}

/* 初始三角形 */
.stage:not(.selected) .orb:nth-child(1) {
  left: 0;
  top: 180px;
}

.stage:not(.selected) .orb:nth-child(2) {
  left: 150px;
  top: 0;
}

.stage:not(.selected) .orb:nth-child(3) {
  left: 300px;
  top: 180px;
}

/* 点击后整体上移 */
.stage.selected .orb {
  top: 20px;
}

/* 主角 */
.stage.selected .orb.active {
  left: 150px;
  transform: translateY(0) scale(1.3);
  z-index: 2;
  box-shadow: 0 0 50px rgba(255, 240, 180, 1);
}

  .stage.selected .orb.left {
  left: 20px;
  transform: translateY(0) scale(0.75);
}

.stage.selected .orb.right {
  left: 280px;
  transform: translateY(0) scale(0.75);
}
  
/* 漂浮动画 */

  @keyframes orbFloat {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}
  
@keyframes fireflyFloat {
  0% {
    transform: translateY(0);
    opacity: 0;
  }
  20% {
    opacity: 1;
  }
  50% {
    transform: translateY(-60px);
    opacity: 0.8;
  }
  100% {
    transform: translateY(-120px);
    opacity: 0;
  }
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;
  background: radial-gradient(circle, rgba(255,220,120,0.9) 0%, rgba(255,220,120,0) 80%);
  filter: blur(1px);
  border-radius: 50%;
  animation: fireflyFloat 12s linear infinite;
  opacity: 0;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.65);
  pointer-events: none;
  z-index: -1;
}

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
}

</style>
</head>

<body>
<div id="header" style="
  text-align:center;
  margin-top:30px;
  margin-bottom:20px;
  position:relative;
  display:inline-block;
  padding:10px 22px;
">

  <div style="
    position:absolute;
    inset:0;
    border:1px solid rgba(255,220,140,0.35);
    box-shadow: 0 0 12px rgba(255,220,140,0.15);
    border-radius:10px;
    pointer-events:none;
  "></div>

  <div style="
    position:absolute;
    top:0;
    left:20%;
    width:60%;
    height:1px;
    background:linear-gradient(to right, transparent, rgba(170,210,160,0.5), transparent);
  "></div>

  <div style="
    position:absolute;
    bottom:0;
    left:20%;
    width:60%;
    height:1px;
    background:linear-gradient(to right, transparent, rgba(170,210,160,0.5), transparent);
  "></div>

  <div style="
    font-size:24px;
    letter-spacing:3px;
    color:#f3efd9;
    font-family: serif;
    text-shadow: 0 0 6px rgba(200,230,180,0.25);
  ">
    秘密集市雷諾曼
  </div>

  <div style="
    font-size:13px;
    letter-spacing:1.5px;
    margin-top:4px;
    color:#cfc7a8;
    opacity:0.8;
  ">
    Secret Bazaar Lenormand ・ 秘密のバザール・ルノルマン
  </div>
  </div> 

  <div class="fireflies"></div>
  
<div class="stage">
  <img src="profile-c.png" class="orb inactive">
  <img src="profile-me.png" class="orb active">
  <img src="profile-g.png" class="orb inactive">

  <div id="profileText"></div>
</div>

<script>
const stage = document.querySelector('.stage');
const orbs = document.querySelectorAll('.orb');
const text = document.getElementById('profileText');

const profiles = [
  "c哥<br><span style='font-size:14px; opacity:0.8;'>每天被拖著熬夜寫指令的忠臣</span>",
  "小抱<br><span style='font-size:14px; opacity:0.8;'>頭髮岌岌可危的點子提供者</span>",
  "小g<br><span style='font-size:14px; opacity:0.8;'>最會給小抱情緒價值+吐槽c哥的弄臣</span>"
];

orbs.forEach((orb, index) => {
  orb.onclick = () => {

    stage.classList.add('selected');

    orbs.forEach(o => {
      o.classList.remove('active', 'inactive', 'left', 'right');
    });

    orb.classList.add('active');

    const others = [...orbs].filter(o => o !== orb);

    others[0].classList.add('inactive', 'left');
    others[1].classList.add('inactive', 'right');

    text.style.opacity = 0;

    setTimeout(() => {
      text.innerHTML = profiles[index];
      text.style.opacity = 1;
    }, 150);
  };
});

/* ✅ 萤火虫（一定在外面！） */
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";
  f.style.animationDelay = Math.random() * 10 + "s";

  fireflyContainer.appendChild(f);
}
</script>

</body>
</html>
