// 🎴 再抽一次按鈕
document.getElementById("drawBtn").addEventListener("click", function() {

  const blocks = document.querySelectorAll(".card-block");

  // ⭐ 洗牌（不重复）
  let shuffled = [...cards].sort(() => Math.random() - 0.5);

  // ⭐ 先全部翻回背面
  blocks.forEach(function(block) {
    block.querySelector(".card-container").classList.remove("flipped");
  });

  // ⭐ 等翻回去后再发牌
  setTimeout(function() {

    blocks.forEach(function(block, index) {

      let card = shuffled[index];

      block.querySelector(".front-img").src = card;
      block.querySelector(".title").innerText = titles[card];
      block.querySelector(".meaning").innerHTML = meanings[card];

      // ⭐ 依序翻开（重点：只翻一次）
      setTimeout(function() {
        block.querySelector(".card-container").classList.add("flipped");
      }, index * 500);

    });

  }, 400);

});


document.querySelectorAll(".card-block").forEach(function(block) {

  let showingMeaning = true;

  const meaningEl = block.querySelector(".meaning");

  meaningEl.addEventListener("click", function() {

    const img = block.querySelector(".front-img").src.split("/").pop();

    if (showingMeaning) {
      meaningEl.innerHTML = traditional[img] || "（尚未補充）";

      meaningEl.style.color = "#ffe7a3";
      meaningEl.style.textShadow = `
        0 0 6px rgba(255,220,120,0.6),
        0 0 14px rgba(255,200,80,0.4)
      `;
      meaningEl.style.animation = "goldFlash 0.6s ease";

    } else {
      meaningEl.innerHTML = meanings[img];

      meaningEl.style.color = "#f5e9cc";
      meaningEl.style.textShadow = "0 0 8px rgba(255,240,180,0.28)";
    }

    showingMeaning = !showingMeaning;

  });

});
