
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌿 背景 */
body {
  margin: 0;
  background: url("forest.jpg") center/cover no-repeat fixed;
  background-color:#0B0F14;

  display: flex;
  justify-content: center;
}

/* 🌑 暗层（变淡！） */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,15,0.4); /* ⭐ 原本太黑 */
  z-index: 0;
}

/* 📖 容器 */
.book-wrapper {
  position: relative;
  width: min(92vw, 900px); 
  margin-top: 40px;
  z-index: 2;
}

/* 📖 图片 */
.book-wrapper img {
  width: 100%;
  height: auto;
  display: block;
}

/* ❗ 强制只显示双页（先稳定） */
.book-single {
  display: none !important;
}

/* 📝 文字（保证在最上层）*/
.book-text {
  position: absolute;
  z-index: 5;

  top: 16%;
  left: 18%;
  width: 30%;

  color: rgba(70, 50, 25, 0.75);  /* ⭐ 更淡 */

  font-family: "Hiragino Mincho ProN", serif;

  line-height: 1.6;               /* ⭐ 拉开（关键） */
  letter-spacing: 0.5px;            /* ⭐ 明显变化 */

 font-size:clamp(12.2px, 1.4vw, 17px);
  font-weight: 400;               /* ⭐ 变轻 */

  text-align: justify;            /* ⭐ 像书（关键） */
}

.book-text p {
  margin: 12px 0;
}

.title {
  flex: 1;
  display: inline-block;
  text-align: left;        /* ⭐ 不要再居中，会更自然 */

  font-size: 1.3em;       /* ⭐ 控标题大小（防换行） */
  line-height: 1.3;

  margin: 0;               /* ⭐ 统一归零 */
  margin-bottom: 6px;      /* ⭐ 控标题 ↔ 下方说明 */
  margin-top:35px;

  letter-spacing: 0.5px;
  color: rgba(50, 35, 20, 0.9);
  white-space: nowrap;
}

  .zh {
  font-family: inherit;
}

.en {
  font-family: inherit;
  font-style: normal;
  margin-left: 4px;
  opacity: 0.75;
}

.fireflies {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

.fireflies span {
  position: absolute;
  width: 13px;
  height: 13px;

  background: radial-gradient(
    circle,
    rgba(255,220,120,0.9) 0%,
    rgba(255,220,120,0.4) 40%,
    rgba(255,220,120,0) 80%
  );

  border-radius: 50%;

  box-shadow:
    0 0 6px rgba(255,220,120,0.6),
    0 0 12px rgba(180,200,255,0.25);

  filter: blur(0.8px);

  /* ⭐ 就是这行不见了！ */
  animation: fireflyFloat 12s linear infinite;
}

@keyframes fireflyFloat {
  0% { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  50% { transform: translateY(-60px); opacity: 0.8; }
  100% { transform: translateY(-120px); opacity: 0; }
}
  .nav {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 50%;
  cursor: pointer;
  z-index: 6;
}

.nav.left { left: 0; }
.nav.right { right: 0; }

  .book-text.left {
  left: 18%;
  width: 26%;
}

.book-text.right {
  left: 56%;
  width: 26%;
}

.card-img {
  display: block;
  width: 110px !important;
  margin: 0; 
  opacity: 0.7;

  mix-blend-mode: multiply;
  filter: contrast(0.9) brightness(0.95);

  border-radius: 4px;
}

/* ⭐ 这个必须独立出来 */
.title-row {
  display: flex;

  align-items: flex-start;

  gap: 15px;              /* 图 ↔ 标题 */

  margin-bottom: 25px;    /* ⭐ 上下区块距离（关键） */
}

.back-btn {
  position: fixed;
  right: 24px;
  bottom: 24px;

  padding: 10px 18px;
  font-size: 14px;
  letter-spacing: 1px;

  z-index: 10;

  color: #f5e9cc;
  text-decoration: none;

  border: 1px solid rgba(255,230,150,0.35);
  border-radius: 999px;

  background: rgba(20,25,30,0.35);
  backdrop-filter: blur(6px);

  /* ⭐ 基础光 */
  box-shadow: 0 0 10px rgba(255,220,120,0.2);

  /* ⭐ 核心：呼吸光 */
  animation: btnBreath 3s ease-in-out infinite;

  transition: all 0.25s ease;
  
}

  @keyframes btnBreath {
  0% {
    box-shadow:
      0 0 8px rgba(255,220,120,0.2);
  }
  50% {
    box-shadow:
      0 0 20px rgba(255,220,120,0.7),
      0 0 40px rgba(255,200,80,0.35);
  }
  100% {
    box-shadow:
      0 0 8px rgba(255,220,120,0.2);
  }
}
  
  /* 📱 手机 + 平板纵向 → 按钮在正下方 */
 @media (max-width: 600px) {

  /* ⭐ 单页 */
  .book-double { display: none; }
  .book-single { display: block !important; }

  /* ⭐ 书位置（只微调，不乱动结构） */
  .book-wrapper {
    width: 92vw;
    margin-top: 80px;   /* ⭐ 从100 → 80（往上收一点） */
    position: relative;
    aspect-ratio: 3 / 4;
  }

  .book-wrapper img {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ⭐⭐ 核心：整块居中 + 上移 */
 .book-text.left {
  left: 33%;     /* ⭐ 往右推（关键） */
  width: 50%;    /* ⭐ 收窄（关键） */
  top: 32%;

  display: flex;
  flex-direction: column;
  gap: 12px;
}
   
  .book-text.right { display: none; }

  /* ⭐ 标题区（不要再漂） */
.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width：100%;

  padding-left: 40px;   /* ⭐ 核心：往右推整组 */
}
  .card-img {
    width: 90px !important;
    flex-shrink: 0;
    margin-top: -75px;
  }

  /* ⭐⭐ 标题稳定器（重点） */
  .title {
    flex: 1;
    text-align: left;

    margin: 0;
    line-height: 1.3;

    white-space: nowrap;

    /* ❗关键两行：防“看起来偏左” */
    display: block;
    margin-left: 70px;
    transform: translateY(-45px);
  }

  /* ⭐ 说明文 */
  .book-text p {
    margin-top: 20px;   /* ⭐ 稍微收紧 */
  }

  .book-text {
    font-size: 12px;
    line-height: 1.5;
  }

  /* ⭐ 按钮 */
  .back-btn {
    left: 50%;
    transform: translateX(-50%);
    bottom: 18px;

    width: fit-content;
    max-width: 160px;
    padding: 10px 16px;

    white-space: nowrap;
    text-align: center;
  }
}
  @media (min-width: 601px) and (max-width: 900px) and (orientation: portrait) {

  /* ⭐ 强制双页 */
  .book-double { display: block !important; }
  .book-single { display: none !important; }

  /* ⭐ 书尺寸恢复正常（关键） */
  .book-wrapper {
    width: min(92vw, 900px);   /* ❗改回双页原本尺寸 */
    margin-top: 150px;
    position: relative;
  }

  /* ⭐ 左页 */
  .book-text.left {
    left: 18%;
    width: 26%;
    top: 16%;   /* ❗恢复原本比例 */
  }

  /* ⭐ 右页 */
  .book-text.right {
    display: block !important;
    left: 56%;
    width: 26%;
    top: 16%;   /* ❗同步 */
  }

}
    
  @media (hover: hover) {
  .back-btn:hover {
    transform: translateY(-2px);

    /* ❗不改背景 → 就不会变黄 */
    background: rgba(20,25,30,0.55);

    /* ⭐ 只做发光 */
    box-shadow:
      0 6px 18px rgba(0,0,0,0.5),
      0 0 18px rgba(255,220,120,0.35),
      0 0 28px rgba(255,220,120,0.15);
  }
}

</style>
</head>

<body>

<div class="fireflies"></div>

<div class="book-wrapper">
  <div class="nav left" onclick="prevPage()"></div>
<div class="nav right" onclick="nextPage()"></div>

  <img src="book-open-v1.png" class="book-double">
  <img src="book-open-v2.png" class="book-single">

 <div class="book-text left page" id="leftPage"></div>
<div class="book-text right page" id="rightPage"></div>

</div>

<a href="bazaar.html" class="back-btn">← バザールへ戻る</a>
  
<script>
const fireflyContainer = document.querySelector(".fireflies");

for (let i = 0; i < 15; i++) {
  const f = document.createElement("span");

  f.style.left = Math.random() * 100 + "%";
  f.style.top = Math.random() * 100 + "%";

  /* ⭐ 每一只萤火虫不同节奏 */
  f.style.animationDelay = -(Math.random() * 12) + "s";
  f.style.animationDuration = (8 + Math.random() * 6) + "s";

  fireflyContainer.appendChild(f);
}

  const pages = [
  { title: "1. 騎士", img: "card1.jpg", text: "ウサギの騎士は仲間たちと、<br>ヒッチハイクしてきた小さなカメを連れて出発！<br>沼でも陸でも――<br>ワニの兄さん、突撃だ！<br><br>キーワード：知らせ、行動、訪れ" },
  { title: "2. クローバー", img: "card2.jpg", text: "石畳の隙間に、四つ葉のクローバーが生えている。<br>人々は気づかず通り過ぎる――<br>でも、三毛猫は見つけたよ。<br><br>キーワード：幸運、チャンス、偶然" },
  { title: "3. 船", img: "card3.jpg", text: "昔は船、今は飛行機、未来には宇宙船もあるかも！<br>そしてもっと先の未来――<br>ねえ、いつかドアを開けたら、<br>どこへでも行ける日が、来るのかな。<br><br>キーワード：旅、移動、遠方" },
  { title: "4. 家", img: "card4.jpg", text: "家は生きている。<br>灯りの呼吸とともに、<br>今日は安心して家で過ごそう。<br><br>キーワード：家庭、安定、基盤" },

  { title: "5.1 現世の樹", img: "card5-1.jpg", text: "あなたは現実の世界にしっかりと根を張っている。<br>形あるものは、着実に成長している。<br><br>キーワード：成長、つながり、生命力" },
  { title: "5.2 精神の樹", img: "card5-2.jpg", text: "あなたの魂は潜在意識の湖に枝を広げている。<br>目に見えない変化が、静かに進んでいる。<br><br>キーワード：内面、精神性、潜在意識" },

  { title: "6. 雲", img: "card6.jpg", text: "雲が視界を遮るが、<br>その先には晴れが待っている。<br><br>キーワード：混乱、不安、曖昧" },
  { title: "7. 蛇", img: "card7.jpg", text: "蛇の尾に続くケシの花を辿って進もう。<br>遠回りの先に、行き先が見えてくる。<br><br>キーワード：誘惑、複雑、曲折" },
  { title: "8. 棺", img: "card8.jpg", text: "終わりは、始まりでもある。<br><br>キーワード：終わり、変化、停止" },
  { title: "9. 花束", img: "card9.jpg", text: "花束の美しさは永遠ではない。<br>それでも、その瞬間にこう言いたい——<br>今夜は月が綺麗ですね。<br><br>キーワード：贈り物、喜び、好意" },

  { title: "10. 鎌", img: "card10.jpg", text: "豊かな収穫の前に、<br>鎌で、断捨離。<br><br>キーワード：決断、収穫、突然" },
  { title: "11. 鞭", img: "card11.jpg", text: "何度も引き裂かれて、<br>ようやく真実に辿り着く。<br><br>キーワード：衝突、繰り返し、圧力" },
  { title: "12. 鳥", img: "card12.jpg", text: "カラス様たちがやってきた！<br>良い知らせか、悪い知らせか、<br>それともただのおしゃべりか。<br>でも、ちょっと騒がしいかも。<br><br>キーワード：知らせ、交流、短期" },

  { title: "13.1 内守る子", img: "card13-1.jpg", text: "内守る子は星から来た子。<br>自分の領域で、静かに世界を観ている。<br><br>キーワード：新しい始まり、純粋、内向性" },
  { title: "13.2 外駆ける子", img: "card13-2.jpg", text: "外駆ける子の世界は、鮮やかに輝く。<br>興味のままに、すべてを探求していく。<br><br>キーワード：新しい始まり、活力、外向性" },

  { title: "14. 狐", img: "card14.jpg", text: "狐が微笑む。<br>どの鍵が、この扉を開けるかな？<br><br>キーワード：策略、狡猾、欺き" },
  { title: "15. 熊", img: "card15.jpg", text: "静けさの奥で、力を蓄え、<br>一撃で仕留める。<br><br>キーワード：力、権威、守護" },
  { title: "16. 星", img: "card16.jpg", text: "星はインスピレーションの種。<br><br>キーワード：ネットワーク、希望、ひらめき" },
  { title: "17. コウノトリ", img: "card17.jpg", text: "変化が起きている。<br><br>キーワード：変化、転換、移動" },
  { title: "18. 犬", img: "card18.jpg", text: "私たちはずっと最高の仲間だよ。笑って :)<br><br>キーワード：忠誠、友情、信頼" },

  { title: "19. 塔", img: "card19.jpg", text: "孤高の塔に花を捧げ。<br>いつか扉が開く日を祈る。<br><br>キーワード：孤立、制度、距離" },
  { title: "20. 庭園", img: "card20.jpg", text: "華やかな宴の始まり！<br>みんなで楽しもう！<br><br>キーワード：社交、人々、公" },
  { title: "21. 山", img: "card21.jpg", text: "蛍の火で須弥山を燃やすには、覚悟が必要。<br><br>キーワード：障害、困難、遅延" },
  { title: "22. 分かれ道", img: "card22.jpg", text: "報告！頂上まで1km、前方15mに蛇あり。<br>道は分かれ、心は最も近い道へと導く。<br><br>キーワード：選択、分岐、決断" },
  { title: "23. ネズミ", img: "card23.jpg", text: "甘い不安と小さな損失が、<br>暗い隅でキーキーと鳴いている。<br><br>キーワード：損失、不安、消耗" },

  { title: "24.1 燃ゆる心", img: "card24-1.jpg", text: "燃ゆる心。命を燃やす情熱。<br><br>キーワード：愛、情熱、感情" },
  { title: "24.2 星宿る心", img: "card24-2.jpg", text: "夜空のように澄んだ心。<br>理解し合える者とだけ響き合う。<br><br>キーワード：つながり、共鳴、魂" },
  { title: "24.3 時を刻む心", img: "card24-3.jpg", text: "日々の営みに、歌とお茶と花を添えて。<br>それが私の心。<br><br>キーワード：関係、日常、寄り添い" },

  { title: "25. 指輪", img: "card25.jpg", text: "すべての約束に、<br>鳩の平和と、ローズマリーの誠実さを。<br><br>キーワード：約束、関係、循環" },
  { title: "26. 本", img: "card26.jpg", text: "扉の向こうの夜をひとり歩く。<br>言葉にならない想いが、まだそこにある。<br><br>かくとだに　えやは伊吹の　さしも草<br>さしも知らじな　燃ゆる思ひを<br><br>キーワード：秘密、知識、隠されたもの" },
  { title: "27. 手紙", img: "card27.jpg", text: "幾夜もコーヒーを重ねて、ついに答えが届く。<br>開けてごらん。<br>どんな結果でも、クマちゃんがそばにいる。<br><br>キーワード：知らせ、書類、通知" },
  { title: "28. 男性", img: "card28.jpg", text: "昼と夜の境目は逢魔が時。<br>このカードを見て、誰を思い浮かべている？<br><br>キーワード：男性、本人、主体" },
  { title: "29. 女性", img: "card29.jpg", text: "昼と夜の境目は逢魔が時。<br>このカードを見て、誰を思い浮かべている？<br><br>キーワード：女性、本人、主体" },

  { title: "30. ユリ", img: "card30.jpg", text: "雪色のユリは、<br>聖女ジャンヌ・ダルクように、<br>気高く純粋。<br><br>キーワード：成熟、平穏、親密" },
  { title: "31. 太陽", img: "card31.jpg", text: "太陽が生まれる。<br>光と喜びが、世界を巡っていく。<br><br>キーワード：成功、エネルギー、喜び" },
  { title: "32. 月", img: "card32.jpg", text: "月が地に落ちた。<br>触れられる面と、消えていく面。<br>あなたはどちらを見る？<br><br>キーワード：感情、直感、揺らぎ" },
  { title: "33. 鍵", img: "card33.jpg", text: "森で迷った赤ずきんに、<br>熊がそっと鍵を差し出してくる。<br><br>キーワード：機会、答え、開く" },
  { title: "34. 魚", img: "card34.jpg", text: "魚たちが三本の斧をくわえてやってきたよ！<br>落としたのは、金？銀？それとも鉄？<br><br>キーワード：富、流れ、資源" },
  { title: "35. 錨", img: "card35.jpg", text: "岸にたどり着いた。<br>何かが定まり、長く続く安定へ。<br><br>キーワード：安定、持続、安全" },
  { title: "36. 十字架", img: "card36.jpg", text: "信念は日常の中に根付く。<br><br>キーワード：運命、重荷、信念" }
];
  
let currentPage = 0;

function renderPage() {

  const isSingle = window.innerWidth <= 600

  if (isSingle) {
    // ⭐ 单页模式（手机 / 平板纵屏）
    const page = pages[currentPage];

    document.getElementById("leftPage").innerHTML = page ? `
      <div class="title-row">
        <img src="${page.img}" class="card-img">
        <b class="title">${page.title}</b>
      </div>
      <p>${page.text}</p>
    ` : "";

    document.getElementById("rightPage").innerHTML = "";

  } else {
    // ⭐ 双页模式（桌面 / 横屏）
    const leftIndex = currentPage * 2;
    const rightIndex = currentPage * 2 + 1;

    const left = pages[leftIndex];
    const right = pages[rightIndex];

    document.getElementById("leftPage").innerHTML = left ? `
      <div class="title-row">
        <img src="${left.img}" class="card-img">
        <b class="title">${left.title}</b>
      </div>
      <p>${left.text}</p>
    ` : "";

    document.getElementById("rightPage").innerHTML = right ? `
      <div class="title-row">
        <img src="${right.img}" class="card-img">
        <b class="title">${right.title}</b>
      </div>
      <p>${right.text}</p>
    ` : "";
  }
}
  
function nextPage() {
  const isSingle = window.innerWidth <= 600

  if (isSingle) {
    if (currentPage + 1 >= pages.length) return;
    currentPage++;
  } else {
    if ((currentPage + 1) * 2 >= pages.length) return;
    currentPage++;
  }

  renderPage();
}

function prevPage() {
  if (currentPage === 0) return;
  currentPage--;
  renderPage();
}
  
renderPage();

  window.addEventListener("resize", renderPage);
  
</script>

</body>
</html>
