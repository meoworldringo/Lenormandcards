<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Bazaar</title>

<style>
body {
  margin: 0;
  background: #0B0F14;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  color: #f5e9d6;
  font-family: serif;
}

/* 🌙 文字容器 */
.scene {
  position: relative;
  width: 80%;
  max-width: 600px;
  text-align: center;
  line-height: 2;
}

/* 共通语言层 */
.lang {
  position: absolute;  
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  white-space: nowrap;
}
.scene1 .lang,
.scene2 .lang {
  opacity: 0;
}

/* 🌕 主语言（日文） */
.jp {
  font-size: 20px;
  letter-spacing: 0.08em;
  text-shadow: 0 0 12px rgba(255,220,150,0.25);
  transform: translate(-50%, -50%);
}

/* 🌫 中文 */
.cn {
  font-size: 20px;
  opacity: 0.18;
  filter: blur(0.3px);
  transform: translate(calc(-50% - 140px), calc(-50% + 80px));
  animation: float1 6s ease-in-out infinite alternate; 
  animation-delay: 1s;
}

/* 🌫 英文 */
.en {
  font-size: 20px;
  opacity: 0.15;
  letter-spacing: 0.04em;
  filter: blur(0.5px);
  transform: translate(calc(-50% + 160px), calc(-50% - 100px));
  animation: float2 7s ease-in-out infinite alternate;
  animation-delay: 2s; 
}
 
/* 🎬 第一段动画 */
.scene1 .jp {
  animation: fade1 5s ease forwards;
}

.scene1 .cn {
  animation: fade1 5s ease forwards;
  animation-delay: 1s;
}

.scene1 .en {
  animation: fade1 5s ease forwards;
  animation-delay: 2s;
}

/* 🎬 第二段动画（延迟） */
.scene2 .jp {
  animation: fade2 5s ease forwards;
  animation-delay: 5.5s;
}

.scene2 .cn {
  animation: fade2 5s ease forwards;
  animation-delay: 6.5s;
}

.scene2 .en {
  animation: fade2 5s ease forwards;
  animation-delay: 7.5s;
}
  
  /* ✅ 控制两段“不会同时出现” */
.scene1 {
  animation: scene1Fade 5s ease forwards;
}

.scene2 {
  opacity: 0; /* 👈关键！！一开始隐藏 */
  animation: scene2Fade 5s ease forwards;
  animation-delay: 5.5s;
}

/* 第一段：正常出现后消失 */
@keyframes scene1Fade {
  0%   { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* 第二段：先隐藏 → 再出现 */
@keyframes scene2Fade {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* 🌐 语言选择 */
.lang-select {
  position: absolute;
  bottom: -120px;
  width: 100%;
  text-align: center;
  opacity: 0;
  animation: showMenu 2s ease forwards;
  animation-delay: 11s;
}

.lang-select a {
  display: block;
  margin: 6px 0;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  transition: 0.3s;
}

.lang-select a:hover {
  color: #ffe9a8;
}

/* ✨ 动画定义 */
@keyframes fade1 {
  0%   { opacity: 0; }
  15%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes fade2 {
  0%   { opacity: 0; }
  15%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes showMenu {
  to { opacity: 1; transform: translateY(-20px); }
}
  /* 🌫️ 漂浮感 */
@keyframes float1 {
  from { transform: translate(calc(-50% - 80px), calc(-50% + 40px)); }
  to   { transform: translate(calc(-50% - 90px), calc(-50% + 50px)); }
}

@keyframes float2 {
  from { transform: translate(calc(-50% + 90px), calc(-50% - 50px)); }
  to   { transform: translate(calc(-50% + 100px), calc(-50% - 60px)); }
}
</style>
</head>

<body>

<div class="scene">

  <!-- 🌙 第一段 -->
  <div class="scene1">
    <div class="lang jp">
      AIと紡いだルノルマンカードの夢の世界。
    </div>
    <div class="lang cn">
      與ai共同編織的雷諾曼幻夢。
    </div>
    <div class="lang en">
     Woven with AI, a realm of Lenormand dreams.
    </div>
  </div>

  <!-- 🌙 第二段 -->
  <div class="scene2">
    <div class="lang jp">
      それが――秘密のバザール。
    </div>
    <div class="lang cn">
      那便是——秘密集市。
    </div>
    <div class="lang en">
      Welcome to—The Secret Bazaar.
    </div>
  </div>

  <!-- 🌐 语言选择 -->
  <div class="lang-select">
    <a href="index-tw.html">繁體中文</a>
    <a href="index-cn.html">简体中文</a>
    <a href="index-jp.html">日本語</a>
    <a href="index-en.html">English</a>
  </div>

</div>

</body>
</html>
