<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Draw a Card</title>
</head>

<style>
body {
  background:#0B0F14;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  margin:0;
  padding-top:40px;
}
</style>

<body>


<div style="perspective:1000px;">

  <div id="card-container" style="
  width:300px;
  height:450px;   
  margin:auto;
  transform-style: preserve-3d;
  transition: transform 1s ease;
">

    <!-- 背面 -->
    <img id="back" src="back.jpg" draggable="false" style="
  position:absolute;
  width:100%;
  backface-visibility:hidden;
  animation: breathe 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 10px rgba(255,255,200,0.25));
">

    <!-- 正面 -->
    <div id="front" style="
  position:absolute;
  width:100%;
  height:100%;
  transform: rotateY(180deg);
  backface-visibility:hidden;
">

  <img id="front-img" draggable="false" style="
    width:100%;
    display:block;
    filter: drop-shadow(0 0 20px rgba(255,255,200,0.4));
  ">

  <div id="text" style="
  padding:14px 0 18px;
  text-align:center;
  color:#f5e6c8;
  font-family: serif;
  text-shadow: 0 0 6px rgba(255,255,200,0.25);
">
    <h2 id="title" style="
  margin:10px 0 6px;
  letter-spacing:2px;
  font-size:18px;
"></h2>
    <p id="meaning" style="
  font-size:16px;
  line-height:1.8;
  width: 400px;           
  position: relative;     
  left: 50%;              
  transform: translateX(-50%); 
  margin: 8px 0 0;        
  word-break: break-word;
  text-align: center;
"></p>

  </div>

</div>
  </div>

</div>

<style>
@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}
  img {
  -webkit-user-drag: none;
  user-select: none;
  -webkit-touch-callout: none;
}
</style>

document.getElementById("front-img").src = card;
document.getElementById("title").innerText = titles[card];
document.getElementById("meaning").innerHTML = meanings[card];

// 延迟翻牌
setTimeout(function() {

  // 停止呼吸
  document.getElementById("back").style.animation = "none";
 
  // 翻牌
  document.getElementById("card-container").style.transform = "rotateY(180deg)";

}, 1200);

document.addEventListener("contextmenu", function(e) {
