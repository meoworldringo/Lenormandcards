<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Draw a Card</title>
</head>

<body style="
background:#0B0F14;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
">

<div style="perspective:1000px;">

  <div id="card-container" style="
  width:300px;
  height:450px;   
  margin:auto;
  transform-style: preserve-3d;
  transition: transform 1s ease;
">

    <!-- 背面 -->
    <img src="back.jpg" id="back" style="
      position:absolute;
      width:100%;
      backface-visibility:hidden;
      animation: breathe 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255,255,200,0.25));
    ">

    <!-- 正面 -->
    <img id="front" style="
      position:absolute;
      width:100%;
      transform: rotateY(180deg);
      backface-visibility:hidden;
      filter: drop-shadow(0 0 20px rgba(255,255,200,0.4));
    ">

  </div>

</div>

<style>
@keyframes breathe {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}
</style>

<script>
var cards = [
"card1.jpg",
"card2.jpg",
"card3.jpg",
"card4.jpg",
"card5-1.jpg",
"card5-2.jpg",
"card6.jpg",
"card7.jpg",
"card8.jpg",
"card9.jpg",
"card10.jpg",
"card11.jpg",
"card12.jpg",
"card13-1.jpg",
"card13-2.jpg",
"card14.jpg",
"card15.jpg",
"card16.jpg",
"card17.jpg",
"card18.jpg",
"card19.jpg",
"card20.jpg",
"card21.jpg",
"card22.jpg",
"card23.jpg",
"card24-1.jpg",
"card24-2.jpg",
"card24-3.jpg",
"card25.jpg",
"card26.jpg",
"card27.jpg",
"card28.jpg",
"card29.jpg",
"card30.jpg",
"card31.jpg",
"card32.jpg",
"card33.jpg",
"card34.jpg",
"card35.jpg",
"card36.jpg"
];


var random = Math.floor(Math.random() * cards.length);

// 设置正面牌
document.getElementById("front").src = cards[random];

// 延迟翻牌
setTimeout(function() {

  // 停止呼吸
  document.getElementById("back").style.animation = "none";
 
  // 翻牌
  document.getElementById("card-container").style.transform = "rotateY(180deg)";

}, 1200);
</script>

</body>
</html>
