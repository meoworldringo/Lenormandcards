<title>Draw a Card</title>

body {
  background:#0B0F14;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  margin:0;
  padding-top:40px;
}
</style>

<body>


<div style="perspective:1000px;">

  <div id="card-container" style="
  width:300px;
  height:450px;   
  margin:auto;
  transform-style: preserve-3d;
  transition: transform 1s ease;
">

    <!-- 背面 -->
    <img src="back.jpg" id="back" style="
      position:absolute;
      width:100%;
      backface-visibility:hidden;
      animation: breathe 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255,255,200,0.25));
    ">

    <!-- 正面 -->
    <div id="front" style="
  position:absolute;
  width:100%;
  height:100%;
  transform: rotateY(180deg);
  backface-visibility:hidden;
">

  <img id="front-img" style="
    width:100%;
    display:block;
    filter: drop-shadow(0 0 20px rgba(255,255,200,0.4));
  ">

  <div id="text" style="
  padding:14px 16px 18px;
  text-align:center;
  color:#f5e6c8;
  font-family: serif;
  text-shadow: 0 0 6px rgba(255,255,200,0.25);
">
    <h2 id="title" style="
  margin:10px 0 6px;
  letter-spacing:2px;
  font-size:18px;
"></h2>
    <p id="meaning" style="
  font-size:14px;
  line-height:1.6;
  max-width:260px;
  margin:0 auto;
"></p>
  </div>

</div>
  </div>

</div>

<style>
@keyframes breathe {
  0% { transform: scale(1); }
