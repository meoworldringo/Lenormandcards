<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Bazaar</title>

<style>
body {
  margin: 0;
  background:
    radial-gradient(circle at 50% 50%, rgba(150,180,255,0.15), transparent 60%),
    radial-gradient(circle at 30% 70%, rgba(255,220,150,0.06), transparent 65%),
    radial-gradient(circle at 70% 30%, rgba(180,200,255,0.05), transparent 65%),
    #05070a;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  color: #f5e9d6;
  font-family: serif;
}

  body::before {
  content: "";
  position: fixed;
  inset: 0;

  background: radial-gradient(
    circle at center,
    rgba(255,255,255,0.06),
    transparent 60%
  );

  pointer-events: none;
}

/* 🌙 文字容器 */
.scene {
  position: relative;
  width: 80%;
  max-width: 600px;
  text-align: center;
  line-height: 2;
  z-index: 1; 
}

/* 共通语言层 */
.lang {
  position: absolute;  
  left: 50%;
  top: 50%;
  white-space: nowrap;
}
.scene1 .lang,
.scene2 .lang {
  opacity: 0;
}

/* 🌕 语言样式（只负责外观，不负责位置） */
.jp {
  font-size: 18px;
  letter-spacing: 0.08em;
  color: #ffffff;  
  text-shadow: 0 0 14px rgba(191,233,255,0.35);
  filter: blur(0.3px);
  animation: glow 3s ease-in-out infinite;
}

.cn {
  font-size: 17.5px;
  letter-spacing: 0.08em;
  color: #d9d2ff; 
  opacity: 0.16;   
  filter: blur(0.5px);  

  text-shadow:
    0 0 8px rgba(217,210,255,0.4),
    0 0 18px rgba(217,210,255,0.25);  /* 👈柔光 */
}

.en {
  font-size: 22px;
  color: #f8edc8;  
  text-shadow: 0 0 10px rgba(243,226,162,0.25);
  opacity: 0.13;
  letter-spacing: 0.04em;
  filter: blur(0.4px);
}


/* 🌌 六句独立位置（核心） */

.l1 { transform: translate(calc(-50% - 50px), calc(-50% - 150px)); }

.l2 { transform: translate(calc(-50% + 200px), calc(-50% - 20px)); }

.l3 { transform: translate(calc(-50% - 160px), calc(-50% + 110px)); }

.l4 { transform: translate(calc(-50% - 50px), calc(-50% - 150px)); }

.l5 { transform: translate(calc(-50% + 130px), calc(-50% - 20px)); }

.l6 { transform: translate(calc(-50% - 170px), calc(-50% + 110px)); }


/* 🌫️ 漂浮（只作用在部分句子） */

.l2 {
  animation: float2 6s ease-in-out infinite alternate;
}

.l3 {
  animation: float3 7s ease-in-out infinite alternate;
}

.l5 {
  animation: float5 6s ease-in-out infinite alternate;
}

.l6 {
  animation: float6 7s ease-in-out infinite alternate;
}


/* 🌫️ 动画（不会覆盖位置） */

@keyframes float2 {
  from { transform: translate(calc(-50% + 40px), calc(-50% - 20px)); }
  to   { transform: translate(calc(-50% + 50px), calc(-50% - 10px)); }
}

@keyframes float3 {
  from { transform: translate(calc(-50% + 180px), calc(-50% + 100px)); }
  to   { transform: translate(calc(-50% + 200px), calc(-50% + 120px)); }
}

@keyframes float5 {
  from { transform: translate(calc(-50% + 60px), calc(-50% + 40px)); }
  to   { transform: translate(calc(-50% + 70px), calc(-50% + 50px)); }
}

@keyframes float6 {
  from { transform: translate(calc(-50% + 200px), calc(-50% + 120px)); }
  to   { transform: translate(calc(-50% + 220px), calc(-50% + 140px)); }
}

  @keyframes glow {
  0%, 100% {
    text-shadow: 0 0 8px rgba(191,233,255,0.2);
  }
  50% {
    text-shadow: 0 0 18px rgba(191,233,255,0.5);
  }
}
 
/* 🎬 第一段动画 */
.scene1 .jp {
  animation: fade1 5s ease forwards;
}

.scene1 .cn {
  animation: fade1 5s ease forwards;
  animation-delay: 1s;
}

.scene1 .en {
  animation: fade1 5s ease forwards;
  animation-delay: 2s;
}

/* 🎬 第二段动画（延迟） */
.scene2 .jp {
  animation: fade2 5s ease forwards;
  animation-delay: 5.5s;
}

.scene2 .cn {
  animation: fade2 5s ease forwards;
  animation-delay: 6.5s;
}

.scene2 .en {
  animation: fade2 5s ease forwards;
  animation-delay: 7.5s;
}
  
  /* ✅ 控制两段“不会同时出现” */
.scene1 {
  animation: scene1Fade 5s ease forwards;
}

.scene2 {
  opacity: 0; /* 👈关键！！一开始隐藏 */
  animation: scene2Fade 5s ease forwards;
  animation-delay: 5.5s;
}

/* 第一段：正常出现后消失 */
@keyframes scene1Fade {
  0%   { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* 第二段：先隐藏 → 再出现 */
@keyframes scene2Fade {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { opacity: 0; }
}

/* 🌐 语言选择 */
.lang-select {
  position: absolute;
  bottom: -120px;
  width: 100%;
  text-align: center;
  opacity: 0;
  animation: showMenu 2s ease forwards;
  animation-delay: 11s;
}

.lang-select a {
  display: block;
  margin: 6px 0;
  color: rgba(255,255,255,0.75);
  text-decoration: none;
  transition: 0.3s;
}

.lang-select a:hover {
  color: #ffe9a8;
}

/* ✨ 动画定义 */
@keyframes fade1 {
  0%   { opacity: 0; }
  15%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes fade2 {
  0%   { opacity: 0; }
  15%  { opacity: 1; }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes showMenu {
  to { opacity: 1; transform: translateY(-20px); }
}
 
</style>
</head>

<body>

<div class="scene">

  <!-- 🌙 第一段 -->
<div class="scene1">
  <div class="lang l1 jp">
    AIと紡いだルノルマンカードの夢の世界。
  </div>
  <div class="lang l2 cn">
    與ai共同編織的雷諾曼幻夢。
  </div>
  <div class="lang l3 en">
    Woven with AI, a realm of Lenormand dreams.
  </div>
</div>

<!-- 🌙 第二段 -->
<div class="scene2">
  <div class="lang l4 jp">
    それが――秘密のバザール。
  </div>
  <div class="lang l5 cn">
    那便是——秘密集市。
  </div>
  <div class="lang l6 en">
    Welcome to—The Secret Bazaar.
  </div>
</div>

  <!-- 🌐 语言选择 -->
  <div class="lang-select">
    <a href="index-tw.html">繁體中文</a>
    <a href="index-cn.html">简体中文</a>
    <a href="index-jp.html">日本語</a>
    <a href="index-en.html">English</a>
  </div>

</div>

</body>
</html>
